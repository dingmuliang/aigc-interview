*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#e8e8ec;--card-bg:#e8e8ec;--text:#2d3436;--text-dim:#636e72;--accent:#6c63ff;--accent2:#e17055;--tag-c:#0984e3;--tag-g:#00b894;--tag-a:#6c5ce7;--tag-q:#e17055;--tag-v:#ff6b6b;--tag-p:#2ecc71;--shadow-l:rgba(255,255,255,0.8);--shadow-d:rgba(163,177,198,0.5);--radius:16px;--font:"Inter","Noto Sans SC","PingFang SC",sans-serif;--mono:"JetBrains Mono",monospace}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased;padding-bottom:40px}
header{padding:40px 20px 28px;text-align:center}
header h1{font-size:32px;font-weight:700;color:var(--text)}
header h1 span{color:var(--accent)}
header p{color:var(--text-dim);font-size:14px;margin-top:4px}
.s{display:flex;justify-content:center;gap:10px;margin-top:20px;flex-wrap:wrap}
.s span{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:50px;background:var(--card-bg);box-shadow:-4px -4px 10px var(--shadow-l),4px 4px 10px var(--shadow-d);font-size:13px;color:var(--text-dim)}
.s b{color:var(--accent)}
.sr{max-width:580px;margin:-16px auto 0;padding:0 16px}
.sr input{width:100%;padding:14px 20px;border-radius:50px;border:none;background:var(--card-bg);box-shadow:inset -3px -3px 6px var(--shadow-l),inset 3px 3px 6px var(--shadow-d);font-size:15px;font-family:var(--font);color:var(--text);outline:none;transition:.2s}
.sr input:focus{box-shadow:inset -4px -4px 8px var(--shadow-l),inset 4px 4px 8px var(--shadow-d)}
.sr input::placeholder{color:var(--text-dim);opacity:.6}
.tw{max-width:700px;margin:20px auto 10px;padding:0 16px}
.tb{display:flex;gap:8px;padding:6px;border-radius:50px;background:var(--card-bg);box-shadow:-3px -3px 6px var(--shadow-l),3px 3px 6px var(--shadow-d)}
.tb button{flex:1;padding:8px 10px;border-radius:40px;border:none;background:transparent;color:var(--text-dim);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);text-align:center;transition:.2s}
.tb button:hover{color:var(--text)}
.tb button.a{background:var(--card-bg);box-shadow:inset -3px -3px 6px var(--shadow-l),inset 3px 3px 6px var(--shadow-d);color:var(--accent);font-weight:600}
.tb .n{font-size:11px;opacity:.6}
@media(max-width:600px){.tb{flex-wrap:wrap;border-radius:10px}.tb button{flex:1 0 45%}}
.i{max-width:700px;margin:6px auto;padding:0 16px;font-size:13px;color:var(--text-dim);min-height:20px}
main{max-width:700px;margin:0 auto;padding:0 16px}
.c{background:var(--card-bg);border-radius:var(--radius);box-shadow:-5px -5px 12px var(--shadow-l),5px 5px 12px var(--shadow-d);margin-bottom:14px;padding:18px 22px;cursor:pointer;transition:.2s}
.c:hover{box-shadow:-6px -6px 14px var(--shadow-l),6px 6px 14px var(--shadow-d);transform:translateY(-1px)}
.c:active{box-shadow:inset -3px -3px 6px var(--shadow-l),inset 3px 3px 6px var(--shadow-d);transform:translateY(0)}
.ci{display:flex;align-items:flex-start;gap:14px}
.num{flex-shrink:0;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--accent);background:var(--card-bg);box-shadow:-2px -2px 4px var(--shadow-l),2px 2px 4px var(--shadow-d);margin-top:2px}
.c h3{flex:1;font-size:15px;font-weight:500;line-height:1.6;padding-top:3px;color:var(--text)}
.stars{flex-shrink:0;font-size:11px;color:#f1c40f;letter-spacing:-1px;white-space:nowrap;margin-top:5px;min-width:52px;text-align:right}
.ar{flex-shrink:0;width:28px;height:28px;margin-top:4px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text-dim);background:var(--card-bg);box-shadow:-2px -2px 4px var(--shadow-l),2px 2px 4px var(--shadow-d)}
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.25);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px)}
.mo.o{display:flex}
.md{background:rgba(255,255,255,0.55);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.35);border-radius:24px;box-shadow:0 8px 40px rgba(0,0,0,0.08),0 2px 8px rgba(0,0,0,0.04);max-width:800px;width:100%;max-height:85vh;overflow-y:auto;padding:32px 36px;position:relative;animation:mi .35s cubic-bezier(0.16,1,0.3,1)}
@keyframes mi{from{opacity:0;transform:scale(0.92) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mc{position:absolute;top:16px;right:16px;width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.3);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);cursor:pointer;font-size:18px;color:var(--text-dim);display:flex;align-items:center;justify-content:center;font-family:var(--font);transition:.2s}
.mc:hover{color:var(--accent2)}
.mc:active{box-shadow:inset -2px -2px 4px var(--shadow-l),inset 2px 2px 4px var(--shadow-d)}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:8px}
@media(max-width:640px){.mg{grid-template-columns:1fr}}
.mq{font-size:18px;font-weight:600;line-height:1.6;color:#2d3436;margin-bottom:16px;grid-column:1/-1}
.mt{display:inline-block;font-size:12px;padding:3px 12px;border-radius:20px;font-weight:500;margin-bottom:14px}
.tgc{background:rgba(9,132,227,0.1);color:var(--tag-c)}.tgg{background:rgba(0,184,148,0.1);color:var(--tag-g)}.tga{background:rgba(108,92,231,0.1);color:var(--tag-a)}.tgq{background:rgba(225,112,85,0.1);color:var(--tag-q)}.tgv{background:rgba(255,107,107,0.1);color:#ff6b6b;border:1px solid rgba(255,107,107,0.2)}.tgp{background:rgba(46,204,113,0.1);color:#2ecc71;border:1px solid rgba(46,204,113,0.2)}
.ma{font-size:14px;line-height:1.9;color:#2d3436}
.ma p{margin-bottom:12px}
.ma ul{padding-left:20px;margin-bottom:10px}
.ma li{margin-bottom:4px}
.ma b,.ma strong{color:#5b4de0}
.ma code{font-family:var(--mono);font-size:13px;background:rgba(91,77,224,0.1);padding:1px 6px;border-radius:5px;color:#4a3fbf}
.ma pre{background:rgba(255,255,255,0.4);border-radius:10px;padding:12px 16px;margin:8px 0;overflow-x:auto;font-size:13px;white-space:pre-wrap;border:1px solid rgba(255,255,255,0.2);backdrop-filter:blur(4px)}
.mt2{font-size:14px;line-height:1.9;color:#2d3436}
.mt2 p{margin-bottom:10px}
.mt2 strong{color:var(--accent2)}
.mtl{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--accent2);margin-bottom:10px;display:block;opacity:.9}
.mtd{border:none;border-top:2px solid var(--accent2);opacity:.2;margin-bottom:12px}
.nr{text-align:center;padding:60px 20px;color:var(--text-dim)}
.nr h3{font-size:18px;margin-bottom:4px;font-weight:500}
.md::-webkit-scrollbar{width:6px}
.md::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:3px;border:1px solid rgba(255,255,255,0.2)}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
@media(max-width:480px){header h1{font-size:24px}.c{padding:14px 16px}.c h3{font-size:14px}.md{padding:20px 18px}}

<script>
var D=[{"c":"c","n":1,"q":"ComfyUI 和 SD WebUI 的核心架构差异？大厂为什么倾向 ComfyUI？","a":"<p><b>架构差异</b></p> <p>SD WebUI 是「全功能封装」架构——所有功能以预设 UI 面板呈现，用户只能在固定框架内操作，管线逻辑是黑盒。你只能点按钮、调滑块，但不知道背后怎么串联的。</p> <p>ComfyUI 是「节点图引擎」架构——渲染管线被拆解为独立节点：加载 → 采样 → 解码 → 后处理，用户可以自定义完整的数据流向和计算图。每个节点是一个独立函数，连线就是数据传递。</p> <p><b>大厂倾向 ComfyUI 的原因：</b></p> <p>① <b>管线可编程</b>——工作流本质是 JSON，可直接接入 CI/CD 流水线和版本控制系统</p> <p>② <b>显存效率</b>——默认只加载当前正在使用的模型，用完即卸载；WebUI 常把全部模型常驻显存</p> <p>③ <b>插件生态可扩展</b>——每个插件是一个新节点类型，不影响核心管线，可独立升级和回滚</p> <p>④ <b>资源消耗透明</b>——精确看到每步的显存和耗时，便于性能优化和成本核算</p>","t":"<p><b>面试官想考察什么：</b>候选人是否理解工具底层架构，而不是只会用。</p>\n<p><b>回答思路：</b>从「架构差异」切入——这是面试官最想听的第一句话。</p>\n<p>ComfyUI 是图引擎，意味着可编程、可组合、可自动化，这三者在工业化管线中是生死攸关的能力。</p>\n<p><b>大厂决策逻辑：</b>生产环境需要的是可复现、可审计、可扩缩的管线，不是拖拽出图好用的工具。</p>\n<p>ComfyUI 的工作流 JSON 可以被 Git 追踪、被 CI 验证、被 API 调用——这决定了它在大厂的地位。</p>","s":5},{"c":"c","n":2,"q":"VAE Decode 为什么是显存瓶颈？Tiled VAE 原理？","a":"<p><b>瓶颈的根因</b></p> <p>VAE Decode 需要将 latent（4×64×64 对应 512×512 图像）通过全卷积网络一次性映射到像素空间。当分辨率提升到 2048×2048 时，中间特征图的通道数 × 空间尺寸乘积极高，单次解码峰值显存约 8GB。且 VAE 解码是单步稠密计算，无法像采样器那样分步执行。</p> <p><b>Tiled VAE 的原理</b></p> <p>将大 latent 图切成小块（如 512×512），对每块独立解码，最后拼接回完整图像。</p> <p><b>关键参数：</b>tile_size=512——每块大小，越小越省显存但越慢；overlap=64-128——块与块之间的重叠像素，防止拼接处的接缝伪影。</p> <p><b>效果：</b>2048×2048 下峰值从 ~8GB 降至 ~1GB。节省了 7 倍的显存。</p>","t":"<p><b>这个问题的价值：</b>考察对模型推理管线的内存模型理解。</p>\n<p>很多人知道 Tiled VAE 省显存，但不知道为什么省。</p>\n<p><b>关键知识点：</b>VAE 的显存峰值出现在中间特征图空间——不是输入也不是输出。</p>\n<p>全卷积网络中间层的通道数可达 512+，乘以 2048×2048 的空间尺寸，数值极大。</p>\n<p>分块后中间特征图也按比例缩小，这才是 Tiled 起作用的数学原因。</p>","s":4},{"c":"c","n":3,"q":"Load Checkpoint 和拆分加载的区别？","a":"<p><b>合一加载</b></p> <p>一次加载 model + clip + vae 三个权重文件到显存，显存需求 = 三者之和（~10-14GB for SDXL）。优点是简单，一个节点搞定全部。</p> <p><b>拆分加载</b></p> <p>用 Load UNet、Load CLIP、Load VAE 三个独立节点分别加载，可在不需要时卸载：CLIP 文本编码完成后即可卸载（早于采样开始），VAE 仅解码阶段需要（采样结束后才加载），UNet 采样阶段独占显存。</p> <p><b>大厂倾向原因：</b>① 不同模型可混搭——UNet 用 FP8，CLIP 用原版，VAE 用专门优化版；② 精细控制加载/卸载时机——峰值显存从三者之和降为单一最大模型；③ LoRA/ControlNet 挂载在 UNet 上，拆分后注入路径更清晰。</p>","t":"<p><b>核心洞察：</b>拆分加载的本质是「时域复用」——不同阶段的模型不需要同时存在于显存中。</p>\n<p><b>面试官考察重点：</b>是否理解模型加载的时机和生命周期。</p>\n<p>普通用户看到的是「合一更方便」，工程人员看到的是「解耦后的灵活性」。</p>","s":4},{"c":"c","n":4,"q":"KSampler denoise 参数机制？","a":"<p><b>工作机制</b></p> <p>denoise 控制 img2img 中初始噪声叠加的比例。内部流程：① 输入图像经 VAE 编码为 latent；② 按 denoise 值向 latent 叠加对应比例的高斯噪声；③ 采样器从对应的时间步开始反向去噪。</p> <p><b>具体数值的行为：</b>denoise=1.0 叠加 100% 噪声 → 等效 txt2img，原图内容完全丢失；denoise=0.5 叠加 50% 噪声 → 从 t=0.5T 开始降噪，保留约 50% 原图结构；denoise=0.0 不做任何生成，直接返回原图。</p> <p><b>公式角度：</b>noisy_latent = sqrt(1-ᾱ)·ϵ + sqrt(ᾱ)·latent_original，其中时间步 t 由 denoise 映射。</p>","t":"<p><b>为什么问这个：</b>考察对扩散模型原理的深层理解——不只是会用，而是知道去噪过程的起点由什么决定。</p>\n<p><b>关键拐点：</b>理解 denoise 和时间步的映射关系。</p>\n<p>很多人以为 denoise=0.5 是「一半原图一半新图」——这没错，但面试官想听的是「它在潜空间时间步维度的具体位置」。</p>","s":4},{"c":"c","n":5,"q":"CFG Scale 数学含义？过高/过低会怎样？","a":"<p><b>数学定义</b></p> <p>Classifier-Free Guidance 的引导系数。采样时，模型同时计算有条件预测 epsilon_cond 和无条件预测 epsilon_uncond。最终预测：epsilon = epsilon_uncond + CFG × (epsilon_cond - epsilon_uncond)。CFG=1.0 完全无引导，CFG=7-10 为典型值。</p> <p><b>过高（>15）：</b>过度偏向条件 prompt，颜色过饱和、出现伪影、结构僵硬，俗称「烧焦感」。原因：差值 epsilon_cond - epsilon_uncond 被线性放大超出合理范围。</p> <p><b>过低（<3）：</b>引导不足，图像趋向平均化，与 prompt 的相关性低，构图平淡。</p>","t":"<p><b>这道题的陷阱：</b>很多人回答「CFG越大越像prompt」——对但不完整。</p>\n<p>面试官想听的是数学本质。</p>\n<p><b>为什么CFG过高会崩：</b>差值项 (epsilon_cond - epsilon_uncond) 本身就有噪声——它是两个随机过程的差。</p>\n<p>CFG 放大它时，也放大了差值项本身的方差，导致输出不稳定。</p>","s":3},{"c":"c","n":6,"q":"面条线问题是什么？解决策略？","a":"<p><b>问题定义</b></p> <p>当工作流包含 20+ 节点时，节点间的连线交叉缠绕，视觉上像一碗面条，难以阅读、调试和协作。</p> <p><b>四种解决策略：</b>① Reroute 节点（原生）——在关键位置插入 Reroute 节点做连线中转，减少长距交叉线；② cg-use-everywhere（插件）——同名接口自动匹配，无需物理连线，革命性解决面条线；③ KJNodes Set/Get（插件）——用 Set 节点写值到键名，Get 节点按名读取，路径完全隐藏；④ Group 分组（最佳实践）——按功能分区：输入区 → 预处理区 → 采样区 → 后处理区 → 输出区，每个分区用不同颜色框住。</p>","t":"<p><b>这个问题的本质：</b>考察工作流的「架构设计能力」——不只是搭通，而是搭干净。</p>\n<p><b>为什么是面试题：</b>面条线问题映射到代码中的「意大利面条式代码」。</p>\n<p>会分 Group、会用 Reroute、会解耦的人，写代码也会有良好的模块化意识。</p>","s":3},{"c":"c","n":7,"q":"ControlNet 工作机制？多 ControlNet 怎么叠加？","a":"<p><b>ControlNet 机制</b></p> <p>ControlNet 是 UNet 编码器的一个可训练副本，通过零卷积层注入到主 UNet 的中间层。在采样循环的每个时间步将控制信号叠加到 UNet 的预测中。预处理器提取控制信号（Canny 边线 / 深度图 / 姿态骨架等）→ ControlNet 节点将信号注入 KSampler 的 model 输入。</p> <p><b>多 ControlNet 叠加：</b>多个 ControlNet 节点串行注入到同一 KSampler，控制条件在特征空间逐元素相加（weighted sum）。</p> <p><b>实战技巧：</b>① 每个 ControlNet 设不同 strength（0.5-0.8）；② 设不同 end_percent 错峰卸载——如 Canny 全程（1.0），深度图仅前半程（0.5）；③ 用 ControlNet Union 替代 2-3 个独立 ControlNet——显存节省 50%+。</p>","t":"<p><b>面试官想听的关键点：</b>是否理解 ControlNet「不改变 UNet 推理过程，只在每一步外加一个控制信号」——而不是 ControlNet 修改了模型。</p>\n<p><b>多 ControlNet 的核心思路：</b>不是「多个条件同时约束」，而是「多个控制维度在特征空间叠加」。</p>\n<p>这不是数学加法，是特征融合。</p>","s":5},{"c":"c","n":8,"q":"LoRA 加载原理？多 LoRA 叠加权重处理？","a":"<p><b>LoRA 加载原理</b></p> <p>LoRA 权重文件包含若干 (W_A, W_B) 低秩矩阵对，加载时将 W_orig + alpha × (W_A @ W_B) 合并到原权重中。LoRA 不增加推理计算量——权重在加载时已融合，推理时没有额外开销。</p> <p><b>多 LoRA 叠加的数学：</b>W_final = W_orig + Σ (alpha_i × (W_A_i @ W_B_i))。每个 LoRA 的 delta 权重按 alpha 系数累加到原模型。</p> <p><b>风险：</b>同层叠加多个 LoRA 可能参数冲突，典型表现为特征泄露——两个 LoRA 同时修改 attention 层的 key/value，权重过大时互相抵消或过拟合。</p>","t":"<p><b>核心洞察：</b>LoRA 不是训练了一个小模型挂在旁边——它是把差值 ΔW 合并进原权重。</p>\n<p>所以推理时完全没有额外计算开销。</p>\n<p><b>多LoRA冲突的原因：</b>两个 LoRA 都在同一层上做「修正」，如果修正方向不一致（一个想把注意力拉向 A，一个拉向 B），结果就是互相抵消或产生新伪影。</p>","s":4},{"c":"c","n":9,"q":"ComfyUI API 模式？生产部署注意？","a":"<p><b>API 模式</b></p> <p>--listen 启动后暴露 HTTP API（默认 8188 端口）。核心端点：POST /prompt 提交工作流 JSON（含节点数据+文件输入），GET /history/{prompt_id} 轮询输出结果，GET /view 获取生成图像。通过 /internal/queue 管理执行队列。</p> <p><b>生产注意事项：</b>① 队列管理——默认单线程执行，高并发需自建任务队列+多实例 worker；② 显存隔离——每个 ComfyUI 进程独占 GPU，Docker 做资源隔离；③ 文件系统——输入输出路径需挂载共享存储（NFS/S3）；④ 安全加固——默认无鉴权，需加 Nginx 反向代理 + API Token；⑤ 超时兜底——每个 prompt 请求加超时+熔断。</p>","t":"<p><b>这道题的价值：</b>考察「AI 模型工程化」能力——从单机调试到生产部署的思维转变。</p>\n<p><b>面试官的潜台词：</b>只在本地拖过节点的人答不出生产部署的坑。</p>\n<p>每一条注意事项都是线上事故的血泪教训。</p>","s":5},{"c":"c","n":10,"q":"Batch size>1 为什么线性增加显存？","a":"<p><b>关系</b></p> <p>batch_size 决定 latent 在 batch 维度的尺寸。batch_size=4 的 latent 形状为 (4,4,64,64)，batch=1 为 (1,4,64,64)。UNet 推理时 batch 维度平行计算——所有图像共享相同权重，但激活值和中间张量独立。</p> <p><b>线性增长原因：</b>Self-Attention 的计算复杂度为 O(batch × n_patches² × d_model)。batch 翻 n 倍，所有中间激活值张量也翻 n 倍。且 KV Cache 在自注意力中同样线性增长。</p> <p><b>实际陷阱：</b>同一 batch 的多张图使用相同的初始噪声 seed（仅 prompt embedding 不同），导致输出图像间高度相似。真正要多样性应使用队列单张生成 + 不同 seed。</p>","t":"<p><b>这个问题的技术深度：</b>考察对 Transformer 计算图的内存模型理解。</p>\n<p><b>为什么不是「加一个零」那么简单：</b>batch 不仅在输入端翻倍，attention 的 QKV 矩阵也翻倍，attention score 矩阵也翻倍——每一层的每一处中间值都翻倍。</p>","s":3},{"c":"c","n":11,"q":"Lazy Evaluation 机制？","a":"<p><b>定义</b></p> <p>ComfyUI 在执行工作流前，会构建完整的计算图 DAG。只有当一个节点的所有输入都就绪时，该节点才会被执行。这与拓扑排序完全等价。</p> <p><b>对执行顺序的影响：</b>①②节点的执行和被安排在屏幕上的顺序无关，完全由数据依赖关系决定。Load Image 和 CLIP Text Encode 可以并行执行（无数据依赖），但 KSampler 必须等两者都完成。含环的图会被检测并报错。</p>","t":"<p><b>面试官的考察点：</b>是否理解声明式编程范式。</p>\n<p>ComfyUI 的节点图本质上是声明式数据流——你说「要做什么」，引擎决定「什么时候做」。</p>\n<p><b>和 React/Vue 的相似性：</b>Lazy evaluation、拓扑排序、DAG 调度——和前端的渲染调度原理是相通的。</p>","s":3},{"c":"c","n":12,"q":"--novram 和 --lowvram 区别？","a":"<p><b>--lowvram（推荐 8-12GB 显卡）：</b>以模型粒度卸载，只将当前正在执行的模型加载到显存，执行完毕立即卸载回 CPU。峰值显存 ≈ 最大单个模型大小。速度影响：慢 20-40%。</p> <p><b>--novram（推荐 6-8GB 或紧急场景）：</b>以操作粒度卸载，在单次模型推理内部按注意力层/卷积层的粒度逐层加载执行并卸载。峰值更低但 I/O 开销极大。速度影响：慢 50-70%。</p> <p><b>选型建议：</b>8-12GB 用 --lowvram + --force-fp16；6-8GB 紧急用 --novram；24GB+ 用 --highvram 或默认。</p>","t":"<p><b>本质区别：</b>--lowvram 是粗粒度模型交换，--novram 是细粒度算子交换。</p>\n<p>粗粒度 I/O 次数少，细粒度显存更省但 I/O 更密集。</p>\n<p>和操作系统虚拟内存换页策略同构。</p>","s":3},{"c":"g","n":1,"q":"AIGC 项目 Git 仓库应该提交/不提交什么？","a":"<p><b>应该提交：</b>推理代码、工作流 JSON、部署配置（Dockerfile / k8s yaml）、Prompt 策略文件、LoRA 训练脚本、数据集预处理代码、实验配置文件（YAML）、requirements.txt / pyproject.toml。</p> <p><b>不应该提交：</b>❌ 基础模型权重文件（几 GB~几十 GB）——走 HuggingFace 模型 registry 或 S3；❌ 大体积原始数据集——走对象存储 + data registry，代码里只记录 dataset hash；❌ 生成的运营图——Git 不是图床；❌ node_modules、__pycache__、.cache——上 .gitignore。</p>","t":"<p><b>核心原则：</b>Git 管理的是「代码和轻量配置」，不是「数据和产物」。</p>\n<p>模型文件是最大的陷阱——2GB 的模型改 5 个版本，仓库膨胀到 10GB。</p>\n<p>团队约定 git 里只存 hash 引用，模型本身走对象存储是标准做法。</p>","s":5},{"c":"g","n":2,"q":"Git LFS 解决什么？适用场景？","a":"<p>Git对二进制大文件完整存储每个版本，2GB模型改5次仓库膨胀到10GB+。</p>\n<p>适用：LoRA/Embedding文件(LFS)、预处理器权重。</p>\n<p>不适用：基础大模型(走registry)、原始数据集。</p>\n<p>大厂限制：单文件<=200MB，总LFS<=5GB。</p>","t":"<p>LFS是大文件版本控制不是大文件存储。</p>\n<p>基座模型不常改不需要，LoRA频繁迭代需要。</p>","s":4},{"c":"g","n":3,"q":"ComfyUI工作流JSON的Git特殊性？冲突避免？","a":"<p>节点ID自动生成易冲突、JSON含坐标噪音、连线node_id引用易断。</p>\n<p>方案：Python DSL化(推荐)、画布分区、稳定后仅改参数不动结构。</p>","t":"<p>自动生成格式不适合手工merge，从JSON升级到Python DSL才是正解。</p>","s":4},{"c":"g","n":4,"q":"Prompt-as-Code中Git怎么管理版本？","a":"<p>prompt写成.yaml，git log回溯修改、git diff精确看改了什么词、git blame追责、分支管理不同风格线。</p>\n<p>大厂每条Prompt走PR审批。</p>","t":"<p>Prompt是需要版本管理和追溯责任的代码资产，不是随手打的文字。</p>","s":4},{"c":"g","n":5,"q":"AIGC项目Git分支策略？","a":"<p>main→staging→develop→feature/experiment/hotfix。</p>\n<p>AIGC特有：experiment分支短命(1-3天)、上线打tag方便回滚、LFS不分支防存储翻倍。</p>","t":"<p>AIGC实验失败率70%+，短命分支+打tag保留失败记录是刚需。</p>","s":4},{"c":"g","n":6,"q":"merge和rebase区别？AIGC中更推荐哪个？","a":"<p>merge保留分叉，rebase线性化。</p>\n<p>AIGC：实验/个人用rebase(squash成有意义条目)，多人/发布用merge。</p>\n<p>已推送分支永不rebase。</p>","t":"<p>每次调参是一个commit，rebase+squash把调参记录压缩成有意义的条目。</p>","s":3},{"c":"g","n":7,"q":"AIGC commit message怎么写？","a":"<p>格式：[模块]改动摘要+原因。</p>\n<p>示例：✅ [workflow]切换到Turbo模式；✅ [prompt]服装模板v2。</p>\n<p>❌ update file。</p>","t":"<p>commit message是告诉未来自己为什么这么改，不是描述改了啥。</p>","s":4},{"c":"g","n":8,"q":"revert和reset区别？误提交大模型文件？","a":"<p>reset丢弃历史(不能已推送)，revert安全创建反向commit。</p>\n<p>误提交后git revert用BFG Repo-Cleaner从历史彻底移除。</p>","t":"<p>即使revert了历史中仍有blob，只有BFG能彻底抹掉。</p>","s":4},{"c":"a","n":1,"q":"AI 客服 Agent 单 Agent 还是多 Agent？","a":"<p><b>架构：多 Agent + Supervisor 混合模式</b></p> <p>用户 → Router Agent（意图识别）分发到：订单 Agent（查订单 API）、退换货 Agent（售后 API）、优惠券 Agent（营销 API）、回答格式化 Agent（统一语气风格）。</p> <p><b>理由：</b>① 单 Agent + 50 个工具——上下文塞满，模型选择工具准确率降到 60% 以下；每个子 Agent 只有 5-8 个工具，准确率 > 90%；② 隔离性——一个 Agent 被注入不扩散到其他 Agent；③ Router 用轻量模型降低成本。</p>","t":"<p>工具数量超过 15-20 个时模型选择准确率显著下降。</p>\n<p>拆的粒度是「业务边界」——订单/退换货/优惠券是天然的业务边界。</p>","s":5},{"c":"a","n":2,"q":"Tool Call幻觉怎么解决？","a":"<p>三层防御：Schema强制执行(JSON Schema校验)+结果校验节点(验证Agent检查合理性)+二次确认(高危操作用户确认)。</p>\n<p>核心：不信任模型输出，每环节加校验器。</p>","t":"<p>把防御嵌入执行链路，不是写在prompt里期望模型遵守。</p>","s":5},{"c":"a","n":3,"q":"150+工具放不进上下文？","a":"<p>三层动态注入：关键词预分类(退->售后组)+意图分类模型(只注入5-10个)+运行时动态加载。</p>\n<p>准确率从60%提升到95%。</p>","t":"<p>强行塞入的唯一结果是准确率暴跌，必须按需加载。</p>","s":5},{"c":"a","n":4,"q":"24小时跨会话记忆怎么设计？","a":"<p>三层架构：Working Memory(Redis TTL24h)+Episodic Memory(SQLite TTL7天)+Long</p>\n<p>-Term Memory(向量库永久)。</p>","t":"<p>不同生命周期的记忆放不同存储层，定好TTL。</p>","s":5},{"c":"a","n":5,"q":"短期记忆窗口满了？","a":"<p>混合压缩：最近10轮完整保留(滑动窗口)+中间部分LLM摘要+关键信息(工具结果)不动。</p>","t":"<p>单纯摘要丢失细节，单纯滑动窗口丢失早期上下文，按可压缩程度分级处理。</p>","s":4},{"c":"a","n":6,"q":"长期记忆怎么召回？","a":"<p>向量检索Top-50→时效性加权(10天后权重减半)→重排序取Top-5。</p>\n<p>用户偏好会变化，半年前喜欢可能过时了。</p>","t":"<p>召回系统三阶段：粗筛→衰减→精排。</p>","s":4},{"c":"a","n":7,"q":"子Agent结果怎么保证质量？","a":"<p>分级验证：低风险(查天气)自评>0.9直接过；中风险(写代码)Supervisor格式校验；高风险(发邮件)两Agent交叉对比。</p>","t":"<p>查天气错了最多说句不准，发邮件错了可能泄露信息。</p>","s":4},{"c":"a","n":8,"q":"子Agent冲突怎么裁决？","a":"<p>证据权重：数据来源权威0.9、逻辑推导0.7、观点/意见0.3。</p>\n<p>权重差>0.3采信高的一方。</p>","t":"<p>Supervisor做信息质量判断，不比正确性比论证坚实程度。</p>","s":4},{"c":"a","n":9,"q":"Agent Prompt注入怎么防扩散？","a":"<p>三层隔离：最小权限+通信过滤(不允许元指令)+隔离恢复(沙箱副本替代)。</p>","t":"<p>和微服务故障隔离思路相同——一个服务出问题不应导致整个系统雪崩。</p>","s":5},{"c":"a","n":10,"q":"Prompt注入在Agent场景下更危险？","a":"<p>攻击面：工具调用注入(发邮件/删数据)、记忆污染(长期潜伏)、上游投毒(读取即中毒)。</p>\n<p>纯文本LLM输出文字，Agent直接执行有害操作。</p>","t":"<p>Agent比LLM多了一个执行层，有害指令直接对接真实世界API。</p>","s":5},{"c":"a","n":11,"q":"防止隐私信息外泄？","a":"<p>三层过滤器：输入层(手机号/邮箱</p>\n<p>->{MASK})+工具调用层(高危字段进审批链)+输出层(回复再过PII检测)。</p>","t":"<p>零信任原则，不信任任何一层输出，每层假设上一层的过滤有遗漏。</p>","s":4},{"c":"a","n":12,"q":"发邮件被注入怎么防御？","a":"<p>双重确认：生成不执行->检查白名单->用户确认。</p>\n<p>最安全：Agent只能生成草稿用户手动发送。</p>","t":"<p>邮件发出难撤回，加Human-in-the-Loop让用户对操作有知情权。</p>","s":4},{"c":"a","n":13,"q":"怎么衡量Agent好不好？","a":"<p>六维：完成率>90%+工具选择准确率>95%+参数合法率>98%+幻觉率<5%+平均完成<30s+Token消耗<5000。</p>","t":"<p>覆盖结果质量/决策质量/执行质量/可信度/体验/成本，六维缺一不可。</p>","s":5},{"c":"a","n":14,"q":"Tool Call成功率70%怎么排查？","a":"<p>分段埋点：意图识别→工具选择→参数生成→服务端执行→结果解析。</p>\n<p>案例：80%失败在参数生成→加Schema后处理填空后92%。</p>","t":"<p>先profile再优化，不是凭感觉瞎改。</p>","s":4},{"c":"a","n":15,"q":"参数总有小错误不重训？","a":"<p>后处理修复器(「明天」→2026-04-16「一百块」→100)。</p>\n<p>在tool description里加示例，客户端主动预填。</p>\n<p>错误率从15%降到2%。</p>","t":"<p>模型犯的错有规律，与其重训不如建自动纠错层。</p>","s":4},{"c":"a","n":16,"q":"MCP和Function Calling区别？","a":"<p>MCP开放协议支持运行时发现、跨模型可移植；FC厂商私有。</p>\n<p>选MCP：工具多变+多模型+多人共享。</p>\n<p>选FC：固定+单一+毫秒延迟。</p>","t":"<p>MCP多一层Server进程换跨模型可移植性。</p>","s":4},{"c":"a","n":17,"q":"Agent降本策略？","a":"<p>-50%降本)+语义缓存(20</p>\n<p>-40%)+提前终止(5</p>\n<p>-15%)+Token压缩(10</p>\n<p>-20%)+批量处理。</p>","t":"<p>该贵的任务用贵模型，能便宜的用便宜模型，语义缓存降本最大但最容易被忽略。</p>","s":4},{"c":"a","n":18,"q":"Skill Marketplace安全审核？","a":"<p>四层：静态分析(高危命令黑名单)+沙箱测试(Docker监控)+权限声明审核+社区评分。</p>\n<p>新上架默认不受信任。</p>","t":"<p>从App Store+Chrome插件+npm借鉴的安全机制组合。</p>","s":3},{"c":"a","n":19,"q":"Reflection机制是什么？","a":"<p>Act→Reflect(结果合理吗)→Correct(纠错重新执行)→Respond。</p>\n<p>成功率提升15-20%，设max_reflection_rounds=2-3防死循环。</p>","t":"<p>给Agent加回头看的一步，和人类做题检查答案一样。</p>","s":3},{"c":"a","n":20,"q":"Agent人格一致性怎么保持？","a":"<p>四层：System Prompt固化(分隔符包围不可压缩)+行为约束层(每轮检查语气)+风格指纹对比(最近5条)+每30轮刷新。</p>\n<p>漂移率70%→5%。</p>","t":"<p>上下文越长开头影响力越衰减，解法是工程上保证人格声明始终在注意力范围内。</p>","s":4},{"c":"q","n":1,"q":"ComfyUI 2D 管线常用插件有哪些？","a":"<p><b>必装基础设施：</b>ComfyUI-Manager（装任何插件前先装它）、rgthree-comfy（复合节点简化连线）、cg-use-everywhere（无线连接解决面条线）。</p> <p><b>生成控制：</b>comfyui_controlnet_aux（ControlNet 预处理器全集）、comfyui_ipadapter_plus（IPAdapter 垫图）。</p> <p><b>画质修复（核心）：</b>ComfyUI-Impact-Pack（Face Detailer 面部修复/崩脸解决必装）、comfyui_ultimatesdupscale（经典无损放大）、comfyui-supir（顶级高清修复）、comfyui-inpaint-nodes（局部重绘）。</p> <p><b>抠图合成：</b>ComfyUI-LayerStyle（像 PS 的图层合成/抠图/背景移除）、SAM 智能抠图。</p> <p><b>推荐 5 个核心就够了：</b>Manager + Impact-Pack + LayerStyle + controlnet_aux + ipadapter_plus，覆盖 80% 场景。</p>","t":"<p>按管线流程分阶段列——不同阶段需要不同类型插件。</p>\n<p>用户立刻知道自己在哪个阶段该用什么插件。</p>\n<p>先从管理器入手，再补充核心画质修复。</p>","s":4},{"c":"q","n":2,"q":"ComfyUI爆显存如何优化？","a":"<p>启动参数(零成本)：--force-fp16(省2-3GB)+--lowvram(省3-6GB)。</p>\n<p>工作流设计：两遍生成法(16GB→8GB)+预处理分离+分辨率阶梯。</p>\n<p>节点优化：VAE换Tiled版(省7GB)+ControlNet用Lite/Union+模型换FP8(6.5GB→3.3GB)。</p>","t":"<p>投入产出比最高的开始：改启动参数→改工作流设计→换节点配置。</p>","s":4},{"c":"q","n":3,"q":"ComfyUI工作流转代码？","a":"<p>工作流本质是JSON。</p>\n<p>--listen直接POST JSON到API，Python封装requests循环提交，ComfyUI-Script用Python DSL写，@comfyflow装饰器。</p>\n<p>大厂：GUI拖->JSON->Python->Git->CI->生产。</p>","t":"<p>GUI是给策划用的，代码是给工程用的，背后是同一套引擎。</p>","s":4},{"c":"q","n":4,"q":"AIGC岗位Git正确用法？","a":"<p>仓库分workflows/prompts/scripts/lora/configs/deploy。</p>\n<p>模型走S3不进Git，Prompt写YAML用diff管理，实验分支打tag保留失败记录，pre-commit拦截>100MB。</p>","t":"<p>模型太大不能进Git+实验密度高到传统策略扛不住——这是AIGC最大不同。</p>","s":4},{"c":"q","n":5,"q":"MCP/Skill/Prompt三者区别？","a":"<p>MCP→通信协议(发现/调用/读取)。</p>\n<p>Skill→知识封装(工具+流程+约束写在SKILL.md)。</p>\n<p>Prompt→执行指令。</p>\n<p>关系链：MCP提供接口→Skill定义流程→Prompt驱动执行。</p>","t":"<p>区分核心是抽象层级，从底层到上层垂直分层，不是替代关系。</p>","s":5},{"c":"q","n":6,"q":"SKILL.md文档格式？","a":"<p>skill-name/ ├── SKILL.md(Frontmatter: name/description/agent_created + 正文：Overview→Prerequisites→Workflow→命令) ├── scripts/ ├── references/ └── assets/</p>","t":"<p>把自己会做的事写成菜谱给另一个Agent看，不写模型已知的知识写不写就不知道的特殊流程命令坑。</p>","s":3},{"c":"q","n":7,"q":"训练角色LoRA数据集怎么构建？","a":"<p>30-150张：特写20-30%+中景40-50%(主力)+全身20-30%。</p>\n<p>覆盖3+角度/服装/光线/背景。</p>\n<p>附加正则化数据(防过拟合)+反概念数据(坏样本)。</p>\n<p>粗标签策略只标会变的特征。</p>","t":"<p>数据配比从推理场景倒推——出图70%是中景所以训练集40-50%是中景。</p>","s":5},{"c":"q","n":8,"q":"训练系列模型(风格一致)思路？","a":"<p>分层双LoRA：风格LoRA(rank=32,30-50张)+角色独立LoRA(rank=64,15-30张各)。</p>\n<p>推理：角色(0.7)+风格(0.5)。</p>\n<p>解耦——变风格只换一个，变角色只增一个。</p>","t":"<p>直觉方案全合一个LoRA里扩量时成本指数增长，解耦方案线性增长。</p>","s":5},{"c":"q","n":9,"q":"不同参数批量跑图用什么插件？","a":"<p>XY Chart(efficiency,2维)+Image Batch(WAS,批量选图)+Batching Nodes(3+维大规模)。</p>\n<p>测试分层：LoRA权重→CFG+Steps→多prompt泛化→固定出多张。</p>","t":"<p>先粗筛再精调再验证。</p>\n<p>2维以下XY Chart，3维以上Batching Nodes。</p>","s":4},{"c":"q","n":10,"q":"模型训练完怎么验证？","a":"<p>四维：角色一致性(10张不同seed face similarity>0.7)+风格一致性(3</p>\n<p>-5角色各5张)+Prompt跟随性(换表情/服装)+泛化能力(训练集外场景)。</p>","t":"<p>每维度对应一个潜在问题，四关都过才合格。</p>","s":4},{"c":"q","n":11,"q":"ComfyUI扩图有哪些方法？","a":"<p>①ImagePadForOutpaint+Inpainting(入门)；②Inpainting模型(质量最好)；③ControlNet Tile(一致性最强)；④Ultimate分步(大扩展可控)。</p>\n<p>最佳性价比：②+③结合。</p>","t":"<p>没有最好只有最适合当前场景，按场景分类回答。</p>","s":4},{"c":"q","n":12,"q":"批量不同prompt跑图用什么？","a":"<p>①Prompt Line(Easy</p>\n<p>-Use,打字即用)；</p>\n<p>②Simple Prompt Batcher(文件读取100+)；</p>\n<p>③WAS Text Concatenate(模板拼接)；</p>\n<p>④XY Chart(网格对比)。</p>","t":"<p>批量跑参数用XY Chart(矩阵对比)，批量跑不同prompt用按行顺序出图(每张独立)。</p>","s":4},{"c":"q","n":13,"q":"局部模糊+高清修复概念不一致？","a":"<p>首选：Tile Upscale替代High-res Fix(denoise=0.15-0.25)。</p>\n<p>其次：Face Detailer只改脸部。</p>\n<p>最后：ControlNet Tile+LoRA双约束。</p>\n<p>都不行才重训。</p>","t":"<p>从易到难——Tile降denoise最轻量→Face Detailer针对性→双约束→最后才重训。</p>","s":5},{"c":"q","n":14,"q":"大模型和LoRA区别？各怎么训练？","a":"<p>大模型是完整画家(2-14GB)，LoRA是参考笔记(5-200MB)。</p>\n<p>LoRA数学：ΔW=B×A低秩分解，1024参数从1M降到128K。</p>\n<p>训练三阶段：预训练(256×A100×30天)→全量微调(8×A100×几天)→LoRA(1×4090×1小时)。</p>","t":"<p>从数学原理讲起——低秩分解假设ΔW是低秩，因为模型已学到大部分知识只需方向微调。</p>","s":5},{"c":"a","n":21,"s":5,"q":"Agent中如何实现流式输出(Streaming)？SSE和WebSocket各适合什么场景？","a":"<p>流式输出让Agent在生成回复的同时逐步推送给用户，而非等全部生成完毕再一次性返回。</p><p>SSE（Server-Sent Events）适合Agent回复文本流式输出——简单、自动重连、兼容HTTP/2。但只能服务端到客户端单向推送。</p><p>WebSocket适合工具调用状态推送+用户打断——全双工、低延迟。但实现复杂、需心跳保活。</p><p>实现方案：在Agent推理循环中，每生成一个token或每完成一个工具调用，就通过SSE事件推送给前端。前端展示打字机效果和工具调用状态。</p>","t":"<p>这是面试中最常见的「工程化」问题——考察候选人不只是会用LLM，还知道如何让产品体验流畅。</p><p>行业实践：OpenAI的streaming API是SSE，小度/天猫精灵的语音交互用WebSocket。</p>"},{"c":"a","n":22,"s":5,"q":"设计Agent的可观测性(Observability)系统，需要埋哪些点？","a":"<p>Agent的可观测性比传统API复杂——因为Agent有推理循环和工具调用链。</p><p>三类埋点：Tracing——每次LLM调用的prompt+response，每次工具调用的入参+出参，工具推荐LangSmith/LangFuse/Arize。Metrics——每秒请求数、Token消耗、工具调用成功率、平均延迟，工具推荐Prometheus+Grafana。Logging——完整对话历史、工具调用链、错误栈，用Elasticsearch/Loki。</p><p>关键指标：延迟(P50/P95/P99)、流量(QPS)、错误率(工具调用失败率)、饱和度(API配额使用率)。</p>","t":"<p>不能只靠console.log——每个Agent调用应生成一个trace_id，贯穿LLM和工具调用，方便端到端追踪。</p>"},{"c":"a","n":23,"s":4,"q":"多Agent编排中DAG模式和State Machine模式的区别？","a":"<p>DAG（有向无环图）：任务按依赖关系并行执行，无环。适合确定的、可预测的工作流，但无法支持循环/条件回退。</p><p>State Machine（状态机）：定义状态+转换条件，支持循环。适合复杂的、状态多变的工作流，但状态爆炸时难维护。</p><p>混合方案（推荐）：顶层用State Machine做状态管理，每个状态下用DAG做任务执行。</p>","t":"<p>DAG适合「固定流程」，State Machine适合「状态流转」。大型系统中通常两者结合使用。</p>"},{"c":"a","n":24,"s":5,"q":"Agent工具选择做错了，怎么诊断？需要哪些指标？","a":"<p>工具选择错误分两类：选错工具（该查天气却调了日历）和不该调用工具却调了（用户闲聊却调了数据库）。</p><p>三层排查：Prompt层——检查工具描述的清晰度；Schema层——检查工具名和参数定义；Decision层——检查模型决策权重。</p><p>定位指标：工具选择准确率（>90%合格）、工具调用率（过高=幻觉、过低=遗漏）、参数完整率（>95%合格）。</p><p>60%的工具选择错误可通过优化工具描述解决——在description里加few-shot示例。</p>","t":"<p>先定位哪一层出问题再针对性修复——不要盲目调参。</p>"},{"c":"a","n":25,"s":4,"q":"Agent的上下文窗口管理策略有哪些？超长了怎么做？","a":"<p>四种策略：滑动窗口（保留最近N轮，最简单）、摘要压缩（每N轮用LLM摘要历史，最常见）、检索增强（历史向量化按需检索，最智能）、结构化记忆（按角色分类存储）。</p><p>选型：<8K全量保留，8K-32K用滑动+摘要，32K-128K用检索增强+结构化，>128K用检索增强+分层摘要。</p>","t":"<p>上下文窗口是Agent设计的核心约束——窗口管理策略决定了Agent的「记忆长度」和「信息保真度」的平衡。</p>"},{"c":"a","n":26,"s":4,"q":"Agent如何做上下文相关性判断——继续当前任务还是开启新任务？","a":"<p>三层判断策略：意图分类（轻量模型判断是否属于当前领域，置信度<0.6进下一层）、实体重叠检测（计算实体Jaccard相似度，>0.3认为相关）、LLM判断（精确输出continue/new）。</p>","t":"<p>这是Agent「主题追踪」的核心——决定是继续当前任务还是开启新上下文，本质是任务边界管理。</p>"},{"c":"a","n":27,"s":4,"q":"Agent的缓存策略？如何防止重复调用相同工具？","a":"<p>三级缓存架构：L1精确缓存（Redis KV，完全匹配，TTL 5min）、L2语义缓存（向量库，embedding相似度>0.95，TTL 30min）、L3会话缓存（内存Map，session_id+工具名，会话结束失效）。组合减少重复工具调用60-80%。</p>","t":"<p>语义缓存是关键——「北京的天气」和「北京今天气温」应该命中同一缓存。</p>"},{"c":"a","n":28,"s":4,"q":"设计多模态Agent——同时处理文本/图片/音频的架构？","a":"<p>架构：输入处理器（文本直接传、图片VLM编码、音频ASR转文字）→模态路由（判断用文本LLM还是多模态LLM）→工具层（每个工具声明能处理的模态）。</p><p>当前最佳实践：GPT-4o原生支持多模态输入，直接传入base64图片即可。建议优先用一个多模态模型而不是拆分多个。</p>","t":"<p>多模态Agent的关键在路由层——判断什么时候需要调用视觉模型，什么时候用更便宜更快的文本模型。</p>"},{"c":"a","n":29,"s":4,"q":"Agent的重试策略怎么设计？工具调用失败后如何决策？","a":"<p>根据失败原因分层处理：超时→指数退避重试(1s 2s 4s,最大3次)；限流→等待后重试(读Retry-After头)；参数错误→不重试让Agent修正；工具不可用→换备用工具；权限拒绝→不上报用户。</p>","t":"<p>不是所有失败都该重试——参数错误重试100次也没用，应该让Agent反思修正。</p>"},{"c":"a","n":30,"s":4,"q":"Agent会话管理——同一用户跨设备跨时段恢复对话？","a":"<p>三层方案：会话存储层(Session: session_id+user_id+最近20轮+用户画像+关键事件)。恢复策略：30分钟内活跃会话直接恢复→24小时内最近会话摘要恢复→全新创建。跨设备同步用WebSocket实时推SSE事件。</p>","t":"<p>跨设备恢复的关键是「摘要恢复」——用LLM压缩历史为摘要注入新会话上下文。</p>"},{"c":"a","n":31,"s":4,"q":"Agent成本控制——用户频繁触发昂贵工具调用怎么办？","a":"<p>四层控制：预算漏斗(日预算耗尽后退回降级)、模型级联(简单用Haiku复杂用Sonnet)、工具调用节流(同一工具短期频繁调用启用缓存)、用户可见降级(不直接拒绝而是降级回复质量并提示用户)。</p>","t":"<p>不直接拒绝用户——降级响应比拒绝好。提示「今日额度已用80%」让用户有心理预期。</p>"},{"c":"a","n":32,"s":5,"q":"Agent Prompt注入防御——让Agent执行危险操作的防御体系？","a":"<p>五层纵深防御：L1输入清洗(过滤<system>忽略前文等危险模式,拦截60%)、L2 System Prompt加固(末端加不可覆盖指令,70%)、L3工具参数校验(敏感工具参数必须白名单,85%)、L4执行前确认(高危操作需用户二次确认,95%)、L5审计追溯(全部记录日志,99%)。</p><p>黄金法则：Agent永远不应该有完全自主执行高危操作的能力——必须有人工确认环节。</p>","t":"<p>纵深防御每层拦截一部分——没有单层能拦截100%，但五层加起来总有效。</p>"},{"c":"a","n":33,"s":5,"q":"Agent模型路由——多个LLM(GPT-4o/Claude/Llama)怎么选哪个处理当前请求？","a":"<p>四维评估：复杂度评分(高复杂度GPT-4o+2,低复杂度用Llama)+模态检测(图片只能GPT-4o)+延迟要求(低延迟用本地Llama)+成本预算(余额不足降级Llama)。效果：成本降低40-60%，任务完成质量保持95%+。</p>","t":"<p>不是所有请求都需要GPT-4o——简单问题用Haiku/Llama又快又省，把贵模型留给复杂推理。</p>"},{"c":"a","n":34,"s":5,"q":"Agent最常见5种失败模式？对应的解决方案？","a":"<p>①工具选择错误(60%靠优化工具描述解决)→②参数幻觉(JSON Schema强校验+后处理修复器)→③上下文遗忘(显式记忆系统+定期重注入关键信息)→④死循环(设max_reflection_rounds+调用次数阈值)→⑤任务漂移(上下文相关性判断+意图重检测)。</p><p>各模式有对应的监控指标：工具选择准确率>90%、参数通过率>95%、实体召回率>80%、单任务调用次数<10次、任务切换准确率>85%。</p>","t":"<p>知道Agent「怎么失败的」和知道「怎么成功的」同样重要——每种失败模式都有特定的监控指标和解决方案。</p>"},{"c":"a","n":35,"s":5,"q":"终极题：从零设计企业级Agent平台，画出架构并解释组件职责？","a":"<p>四层架构：接入层(API Gateway+WebSocket+Kafka) → 路由层(意图分类器+模型路由器+工具选择器) → 执行层(对话/搜索/代码/工作流各Agent+贯穿安全层的输入过滤/参数校验/审批链/日志审计) → 存储层(Redis缓存+Postgres元数据+向量库+S3)。</p><p>企业级要点：多部门隔离(独立API Key+用量配额)、可观测性(全链路trace_id)、灰度发布(新版本10%流量逐步上线)、成本分摊(独立预算超限自动降级)。</p>","t":"<p>这道题考系统设计能力——不只是会用Agent，而是能设计一个可运营、可扩展、可审计的企业级平台。</p>"},{"c":"v","n":1,"s":5,"q":"Vibe Coding 是什么？它和传统编程的核心区别是什么？","a":"<p>Vibe Coding 是由 Andrej Karpathy 在 2025 年提出的概念，指的是用自然语言描述需求、让 AI 生成代码的新编程范式。</p><p>传统编程是手写代码 编译运行 调试修复的循环，每个符号都由程序员精确控制。Vibe Coding 是描述需求 AI 生成 审查验收的循环，程序员从编写者变为引导者和审查者。</p><p>这并不意味着程序员不需要懂技术——恰恰相反：只有理解代码的人才知道让 AI 写什么、怎么写、写出来对不对。</p>","t":"<p>面试官想听的不是概念复述，而是你是否理解这种范式转变的本质——从「怎么写」到「写什么」。</p>"},{"c":"v","n":2,"s":5,"q":"在 Vibe Coding 盛行的时代，你的核心竞争力是什么？","a":"<p>AI 越来越强，但 AI 的输出质量直接取决于人的输入质量。核心优势有五点：问题定义能力（把模糊需求拆成清晰规格）、上下文构建能力（给AI精准有效的输入而非噪音）、结果验证能力（审查代码的业务语义而非只跑通）、技术决策能力（结合团队和业务现状拍板）、成本控制能力（知道什么时候用什么模型）。</p><p>一句话：优势不是比 AI 写得好，而是让 AI 写得更好。</p>","t":"<p>高频面试题。差的回答会说AI做不了复杂业务，好的回答把人和AI定位为协作关系——AI执行，人把控方向和质量。</p>"},{"c":"v","n":3,"s":5,"q":"哪些让 AI 写哪些手写？判断标准是什么？","a":"<p>判断标准不是AI能不能做，而是这段代码出bug的代价有多大和让AI写与手写哪个综合成本更低。</p><p>让AI写：重复性高模式固定的代码（CRUD/样板代码）、知道要什么但手写太慢的代码、不熟悉语言框架的入门代码。</p><p>自己写：改一行配置就解决的小修改（手写比解释更快）、非常熟悉的代码区域（手写更高效）、需要深度理解业务上下文的决策型代码。例如线上空指针加一行判断10秒搞定，交给AI却花几万Token和3分钟——这就是让AI做更贵了。</p>","t":"<p>面试官想听的是你有没有一套清晰的决策框架来决定什么时候用什么时候不用。</p>"},{"c":"v","n":4,"s":4,"q":"怎么审查 AI 生成的代码？重点审查什么？","a":"<p>重点审查三样：业务语义（代码行为是否符合业务意图——AI经常写出看着对、跑得通但语义是错的代码，最容易被漏过）、安全风险（输入校验、权限控制、敏感数据泄露）、工程性（性能、可维护性、代码规范）。</p><p>特别注意边界用例——主流路径完美但边界情况（空值、并发、超时）处理不到位是AI代码的常见问题。</p>","t":"<p>审查AI代码的侧重点和人写代码不同——AI的问题不是语法错，而是语义错和边界遗漏。</p>"},{"c":"v","n":5,"s":4,"q":"AI 代码出线上 bug 怎么处理？","a":"<p>三步走：止血（先回滚或降级恢复线上服务） 定因（看监控确认影响范围、定位问题代码、思考为什么审查时没拦住——是安全没审到还是边界没覆盖还是语义偏差） 补流程（补充测试用例、加强审查重点、调整允许AI生成的场景）。一个bug不可怕，同类bug再出一次才可怕。</p>","t":"<p>考察工程化思维——任何代码都可能出bug，关键是快速止血、定位根因、改进流程防再犯。</p>"},{"c":"v","n":6,"s":5,"q":"AI 代码出问题 AI 也修不好，怎么兜底？","a":"<p>底线问题——不能依赖AI救你，得自己能接手。兜底步骤：止血回滚稳定版本 自己查日志监控链路追踪定位根因 自己修复上线 复盘为什么AI修不好（上下文不够还是超出能力范围？），结论决定下次是否还交给AI处理。</p><p>一句话：AI修不了的时候你得能修。这是底线。</p>","t":"<p>面试官想听的不是你认为自己能比AI修得好，而是你有没有兜底预案——知道什么时候该自己上。</p>"},{"c":"v","n":7,"s":4,"q":"AI 编程工具的 Token 成本怎么控制？","a":"<p>五个策略：模型路由（简单任务用小模型，复杂用大模型，成本降60%+） 上下文管理（只给相关代码片段不塞整个代码库，消耗降3-5倍） Prompt优化（一次性说清楚，模糊Prompt来回改浪费可达24倍） 缓存复用（维护代码模板只让AI填充差异） 任务评估（判断哪些任务让AI做更贵——10秒手修变成3分钟AI交互就不值）。</p>","t":"<p>成本控制是高频题——AI工具是公司出钱，面试官想知道你有没有成本意识。</p>"},{"c":"v","n":8,"s":4,"q":"团队怎么管理 AI 生成的代码？","a":"<p>四件事：代码归属（谁Accept谁负责，没有AI写的所以不归我的说法） 审查流程（AI代码走和人工代码一样的Code Review，不降级标准） 监控指标（追踪AI代码的Bug率和安全漏洞率） 持续优化（根据数据调整AI使用策略）。</p>","t":"<p>团队管理AI代码的关键是零特例——AI代码和人工代码用同一套管理标准。</p>"},{"c":"v","n":9,"s":5,"q":"用 AI 写代码怎么保证不泄露公司代码？","a":"<p>核心问题：很多公司还没有私有化Agent，代码会发送到模型服务端。实际操作：敏感代码不上传（核心算法密钥交易策略绝不用AI工具）、用企业版而非个人版（有数据隔离协议）、配置.claudeignore/.gitignore排除敏感目录、团队统一规范明确哪些项目可以用AI哪些不能。</p>","t":"<p>安全问题企业最关心。回答要体现你有安全意识并且知道具体怎么做——配置ignore文件、区分敏感项目。</p>"},{"c":"v","n":10,"s":4,"q":"你怎么搭建 Vibe Coding 工作流的？用了哪些工具？","a":"<p>推荐工作流：Claude Code/Cursor作为主力编码Agent + 终端复用器保持持久会话 + 版本控制管理变更。核心流程：用自然语言描述需求（含上下文和约束） AI生成代码 审查diff 本地测试 提交代码。不理想则调整描述或补充上下文重试。</p><p>工具选型：Claude Code适合复杂推理和架构任务，Cursor适合快速迭代和补全，Copilot适合日常补全，可混合使用。</p>","t":"<p>考察候选人是否有实战经验——用过的工具链、踩过的坑、总结出的最佳实践。</p>"},{"c":"v","n":11,"s":4,"q":"AI 代码测试覆盖不全面怎么补充？","a":"<p>AI通常只覆盖主路径遗漏边界和异常路径。补充策略：让AI生成测试用例大纲，人工补充边界异常用例后再让AI实现、使用AI辅助覆盖率工具检测遗漏分支、在Prompt里明确要求覆盖空值/越界/并发/超时（显式要求可提高20%+覆盖率）。关键路径测试必须人工编写。</p>","t":"<p>AI最薄弱的环节就是边界处理。知道这一点并知道怎么弥补才合格。</p>"},{"c":"v","n":12,"s":4,"q":"怎么教新人用 AI 编程？常见坑？","a":"<p>新人常见坑：描述太模糊（没有技术栈设计稿约束）、不加上下文（AI不知道目录结构已有API规范）、盲目接受代码（不审查直接提交）、一次问太多（一个Prompt塞满所有需求）。</p><p>核心教法：给AI的信息越精准它给你的代码越好。上下文决定下限，约束决定上限。</p>","t":"<p>面试官想看你是否有教学能力和总结经验的能力——能把教训总结成可复用的方法论。</p>"},{"c":"v","n":13,"s":3,"q":"Vibe Coding 会让初级程序员失业吗？","a":"<p>不会失业，但能力模型需要转变。以前初级程序员的核心是写代码——能写出能跑的代码就合格。现在是能用AI写代码——能高效让AI生成正确代码、能审查AI输出、能修复AI bug。</p><p>对计算机基础（数据结构、算法、网络、操作系统）的理解仍然重要——不懂这些就不知道AI生成的代码对不对。所以不会被替代，但会用AI的会替代不会用AI的。</p>","t":"<p>开放题没有标准答案。面试官想看你的思考深度——不是二元论（失业/不失业），而是能力模型如何演变。</p>"},{"c":"v","n":14,"s":5,"q":"怎么评价 Prompt 写得好不好？怎么优化？","a":"<p>三个评价维度：结果质量（是否满足需求）、交互轮次（几轮达到满意结果，越少越好）、稳定性和可复现性（同样Prompt能否产出稳定结果）。</p><p>优化方法：第一轮写清楚目标+约束+上下文+输出格式。不满意时每次只加一个约束观察效果，避免一次改太多分不清哪个生效。成功Prompt模板化可大幅减少调优成本。</p>","t":"<p>Prompt工程是Vibe Coding的核心技能。面试官想听的不是写得清楚，而是是否有方法论。</p>"},{"c":"v","n":15,"s":5,"q":"你用 Vibe Coding 完成的最复杂项目是什么？扮演了什么角色？","a":"<p>搭建了完整面试题库网站——从需求描述到最终部署全部通过AI对话完成。扮演了三个角色：产品经理（定义功能需求—分类切换/搜索/弹窗/评分）、架构师（决定技术方案—单HTML无依赖/新拟态风格/JSON数据格式）、项目经理（追踪进度、决策优先级）。AI扮演代码生成和执行者。</p><p>关键决策全由我做出（技术选型/UI风格/数据结构），AI负责把决策转化为可运行代码。69道题4个分类两个UI风格星级评分——从零到完成约2小时，没有AI需要1-2天。</p>","t":"<p>面试终极题考实战经验——不是背概念，而是真正用Vibe Coding做过什么。</p>"},{"c":"v","s":5,"q":"AI 生成的代码怎么保证安全性？你会在哪些环节做安全检查？","a":"<p>AI代码的安全问题分三类：数据泄露（代码包含敏感信息）、逻辑漏洞（输入校验缺失/权限控制缺陷）、供应链风险（生成过时/不安全的依赖版本）。</p><p>四层安全检查环节：Prompt层——在Prompt中显式要求安全规范，如「请使用参数化查询防止SQL注入」「请对用户输入做严格校验」。生成层——限制AI能访问的代码范围，用.claudeignore排除敏感文件。审查层——重点审查输入校验、权限控制、敏感数据处理。这是最关键的环节，AI代码的安全问题绝大多数出在这里。测试层——自动运行SAST工具（SonarQube/CodeQL）检测安全漏洞。</p><p>关键原则：不要把安全责任完全交给AI。AI能写出功能正确的代码，但安全需要人来兜底。</p>","t":"<p>面试官想听的不是套话，而是知道安全问题是分层出现的——每一层都有对应的防御手段。</p>","n":16},{"c":"v","s":5,"q":"AI 推荐了有安全漏洞的第三方依赖包，你怎么应对？","a":"<p>这是AI编程中非常实际的问题——AI倾向于推荐流行版本而不是安全版本。</p><p>应对方案：① 让AI推荐依赖时加上版本安全约束——「请推荐Python 3.12兼容且无已知CVE的ORM库最新稳定版」。② 使用自动化依赖扫描工具（Dependabot/Snyk/Trivy）自动检测AI引入的依赖。③ 建立公司级依赖白名单，AI只能从白名单中选择。④ 定期运行npm audit/pip audit扫描依赖安全状态。</p><p>实际案例：AI推荐了lodash 4.17.20，但该版本存在原型链污染漏洞（CVE-2021-23337）。正确的做法是让AI先检查最新安全版本或使用白名单中的替代库。</p>","t":"<p>AI不知道哪个版本有漏洞——它只知道哪个版本最常用。安全版本选择是人的责任。</p>","n":17},{"c":"v","s":5,"q":"AI生成代码中出现了 API Key、密码等硬编码，怎么防止和发现？","a":"<p>这是AI编程中最常见也最危险的安全问题——AI把敏感信息直接写进代码。</p><p>预防措施：Prompt约束——明确要求AI使用环境变量/秘钥管理服务而非硬编码。pre-commit hook——在提交前运行git-secrets或truffleHog扫描代码中的敏感信息模式。.claudeignore——将.env和配置文件排除在AI访问范围之外。CI/CD扫描——在CI流水线中集成敏感信息扫描。</p><p>发现机制：定期扫描整个代码仓库（包括历史commit）——很多安全泄露是在AI生成时没注意、审查也没发现，几周后才在commit历史中被扫出来。</p>","t":"<p>这是面试高频题——几乎每个用过AI编程的人都踩过这个坑。关键是知道怎么堵而不是只说「我会注意」。</p>","n":18},{"c":"v","s":5,"q":"AI 代码引入 XSS/CSRF/SQL 注入等 Web 安全漏洞，怎么防范？","a":"<p>AI写的Web代码最常见的三类漏洞：</p><p>XSS（跨站脚本）：AI生成的React/Vue代码可能忘记对用户输入转义。防范——在Prompt中明确要求「所有用户输出使用textContent或框架自带的XSS防护机制」，审查时重点检查组件的dangerouslySetInnerHTML/v-html用法。</p><p>CSRF（跨站请求伪造）：AI可能忽略CSRF Token的校验。防范——要求AI使用框架内置CSRF保护（如Django的csrf_token、Spring Security的CSRF）。</p><p>SQL注入：AI倾向于使用字符串拼接而不是参数化查询。防范——要求AI「所有数据库查询必须使用ORM或参数化查询，禁止字符串拼接SQL」。</p><p>黄金法则：在每条Agent Prompt的末尾加一条安全约束——「请确保代码没有XSS/CSRF/SQL注入漏洞」。经验表明，这条简单约束能减少60%以上的安全漏洞。</p>","t":"<p>面试官想听的是你有没有把安全融入Vibe Coding工作流——不是事后打补丁，而是在生成阶段就预防。</p>","n":19},{"c":"v","s":4,"q":"用 Claude Code/Cursor 等工具编程时怎么处理网络代理和防火墙问题？","a":"<p>国内企业的常见痛点——AI工具需要连接外网，但内网环境限制了直接访问。</p><p>解决方案分三级：① HTTP代理——配置HTTPS_PROXY环境变量指向公司代理服务。大部分AI工具（Claude Code、Copilot）都支持标准HTTPS代理。② SOCKS5代理——部分工具需要SSH隧道转发，通过ssh -D建立SOCKS5隧道后转发到目标API。③ 私有化部署——最彻底但最贵的方案。在企业内网部署私有LLM（如Llama/DeepSeek的私有版本），所有请求不经过外网。</p><p>网络诊断命令：curl -x代理地址 https://api.anthropic.com --connect-timeout 5测试连通性。如果提示证书问题，可能需要配置公司自签证书。</p>","t":"<p>面试官问这个问题可能意味着他们公司有严格的内网安全策略——知道怎么配置代理和私有化部署是加分项。</p>","n":20},{"c":"v","s":5,"q":"AI 代码生成时引入了竞态条件（Race Condition）等并发安全问题，怎么预防？","a":"<p>AI对并发编程的理解比较薄弱——它擅长写顺序执行的代码，但在多线程/异步场景下容易遗漏同步控制。</p><p>常见问题：共享变量未加锁、异步回调中状态不一致、事务未正确设置隔离级别。</p><p>预防策略：在Prompt中显式声明并发场景——「这段代码会在多线程环境下运行，请确保线程安全」。审查时重点关注共享资源的访问模式。对AI生成的高并发代码，强制要求人工review并发逻辑部分。</p><p>案例：AI生成的「用户余额扣减」代码直接用if balance >= amount检查后扣减，但在高并发下会出现超扣问题——需要加行锁或乐观锁。</p>","t":"<p>AI的弱项之一就是并发和分布式场景。知道AI哪里不行，比知道AI哪里行更重要。</p>","n":21},{"c":"v","s":4,"q":"AI 写的代码日志打印了敏感信息（用户手机号、身份证），怎么防止？","a":"<p>AI经常为了调试方便在代码中加大量日志，有时无意中包含了敏感字段。</p><p>防止措施：Prompt约束——「不要在日志中打印用户敏感信息（手机号、身份证、密码、Token）。如果必须打印，请使用脱敏格式如159****1234」。代码审查——检查新增的logger.info/print语句是否包含敏感字段。自动扫描——在pre-commit hook中集成敏感信息检测规则。</p><p>脱敏工具：使用logstash-logback-encoder或类似工具自动脱敏。结构化日志——JSON格式+敏感字段自动mask比纯文本日志更安全。</p>","t":"<p>小问题但出过很多次安全事故——开发环境日志打印了用户手机号，被测试人员截图发到了群里。</p>","n":22},{"c":"v","s":5,"q":"AI 生成了不安全的认证鉴权代码（如JWT秘钥硬编码、session管理漏洞），怎么处理？","a":"<p>AI在认证鉴权领域的问题集中在这几个方面：</p><p>JWT秘钥硬编码——AI生成的代码中经常出现secret_key='my_secret_key_123'这种写法。解决方案：明确要求「JWT秘钥从环境变量读取」，并在.claudeignore中排除.env文件。</p><p>Session管理漏洞——AI可能忘记设置cookie的HttpOnly/Secure/SameSite属性，或未设置合理的过期时间。在Prompt中明确要求「遵循OWASP Session Management最佳实践」。</p><p>权限校验遗漏——AI生成了API端点但忘记加@login_required或类似鉴权装饰器。在每条API生成的Prompt中都加上「此端点需要用户认证，请在入口处添加鉴权」。</p><p>认证问题是「AI不犯错就不错的」——AI通常能写好登录功能，但你无法预测它什么时候忘记了加鉴权。</p>","t":"<p>认证和授权是AI代码安全问题的重灾区——因为涉及多方状态（用户/服务端/数据库），AI容易遗漏环节。</p>","n":23},{"c":"v","s":4,"q":"AI 生成代码的版权和合规问题——公司能用 AI 生成的代码做商业产品吗？","a":"<p>这是法务和工程部门经常打架的问题。</p><p>核心风险：AI训练数据可能包含受版权保护的代码，AI生成的代码在结构上和GitHub上的开源代码高度相似，可能触发版权纠纷。</p><p>实际操作：使用企业版的AI工具（有代码不被用于训练的法律条款）。配置AI工具不将用户代码用于模型训练（大多数工具的控制台可以关闭）。使用代码溯源工具检测AI生成代码是否与已知开源代码相似。建立内部规范——AI生成的代码如果复用超过3行，必须在注释中注明来源。</p><p>目前主流看法：AI生成的代码属于「工具辅助创作」，版权归属于生成者（你所在的公司）。但法律规定仍在演变中。</p>","t":"<p>大厂面试越来越关注这个问题——因为法务部门开始注意到了。知道基本合规风险即可，不需要法律学位。</p>","n":24},{"c":"v","s":4,"q":"AI 生成的代码性能有问题（如N+1查询、全表扫描），你怎么发现和优化？","a":"<p>AI倾向于生成「功能正确但性能低效」的代码——它能跑通但经不起压力测试。</p><p>常见性能问题：AI生成的ORM查询经常有N+1问题（循环中逐条查询数据库）、缺少索引提示、没有分页就返回全部数据。</p><p>发现方法：Prompt中要求AI标记性能关注点——「请标注这段代码中可能的性能瓶颈」。代码审查中重点关注数据库查询部分（watch循环中的查询）。运行explain analyze验证查询效率。使用APM工具（如New Relic/Datadog）监控新上线端点的性能。</p><p>优化方式：不要让AI重写——而是给AI指出具体问题「这段循环查询数据库是N+1，请改成批量查询+IN子句」。AI在被告知具体问题时的修复质量远高于你自己改。</p>","t":"<p>AI写的代码「跑得通但跑不快」。知道怎么发现和怎么让AI改比手写优化更实际。</p>","n":25},{"c":"v","s":4,"q":"多人协作使用AI编程时，怎么保证代码风格和规范一致？","a":"<p>问题：A的AI生成的代码用tab缩进、单引号、function关键字；B的AI生成的代码用空格缩进、双引号、箭头函数。代码风格不统一。</p><p>解决方案：团队统一的.claude.md/CLAUIDE.md文件——在项目根目录定义AI行为规范。内容包括代码风格（缩进方式/引号风格/命名规范）、技术栈偏好（使用TypeScript取代any、使用async/await取代.then）、安全约束（禁止硬编码、必须参数化查询）。</p><p>创建PR时自动运行代码格式化（prettier/eslint）——不管AI生成什么风格，提交时统一的格式化器自动修正。差的Prompt各自发挥，好的Prompt让团队风格一致。</p>","t":"<p>多人协作时AI的不一致性是个大坑。.claude.md是解决这个问题的关键工具。</p>","n":26},{"c":"v","s":4,"q":"AI 生成的代码在部署上线后出现问题，回滚后怎么分析根因？","a":"<p>AI代码出线上问题后的标准分析流程：</p><p>① 确认影响范围——通过监控和日志确认影响的用户数和持续时间。② 定位问题代码——比较回滚前后的diff，找到AI生成的那段代码。③ 分析根因——是AI写错了？还是Prompt描述不清？还是审查时漏了？这在AI场景下是个关键问题。④ 归类错误类型——业务语义错误、边界条件遗漏、并发问题、安全漏洞，不同类别的预防措施不同。⑤ 改进流程——如果是审查漏了，加强审查清单；如果是Prompt不清晰，优化Prompt模板。</p><p>和一个bug不可怕，同类bug再出一次才可怕。AI场景下尤其如此——同一个Prompt模式会让AI反复犯同一类错误。</p>","t":"<p>和之前类似题目的区别：这次强调「归因于Prompt/流程」而不是归因于AI或人。这是AI编程时代的独特思维——问题通常出在流程而非个体。</p>","n":27},{"c":"v","s":5,"q":"AI 生成的代码涉及到网络请求时，你关注哪些安全问题？","a":"<p>AI生成的网络请求代码的安全关注点：</p><p>① HTTPS vs HTTP——AI有时会生成不安全的HTTP请求。防范：在Prompt中明确要求「所有外部请求使用HTTPS」。在代码审查中检查请求URL前缀。</p><p>② 证书验证——AI可能设置verify=False跳过SSL证书验证（常见于Python requests库）。防范：搜索代码中的verify=False和ssl._create_default_https_context模式。</p><p>③ 请求超时——AI生成的HTTP请求经常不设timeout参数，可能导致线程永久挂起。防范：在Prompt中要求「所有网络请求必须设置合理的timeout值」。</p><p>④ URL注入——AI可能直接将用户输入拼接到URL中。防范：使用URL参数编码而非字符串拼接。</p><p>⑤ 内网IP泄露——AI生成的错误信息可能包含内网IP地址。防范：统一错误处理，屏蔽具体IP信息。</p>","t":"<p>网络请求是AI代码安全的重点领域——AI不理解网络环境的复杂性，容易简化处理导致漏洞。</p>","n":28},{"c":"v","s":4,"q":"AI 编程时怎么处理公司内部的 API 鉴权和 OAuth2 流程？","a":"<p>AI不熟悉公司内部API的鉴权方式——它只知道通用的OAuth2流程但不知道公司具体用的是哪种grant type、Token放在header还是cookie、Token刷新机制是什么样的。</p><p>最佳实践：不要把鉴权实现全部交给AI。让AI生成代码框架，人工填充具体的鉴权配置。将Token获取和刷新逻辑封装成工具函数/类，AI只需调用函数不需要知道内部实现。在项目文档（.claude.md或README）中记录具体的鉴权流程和示例，供AI读取。在Prompt中提供公司鉴权的伪代码示例——「我们使用OAuth2 client_credentials模式，Token有效期2小时，存储在Redis中，请参照以下示例实现」。</p>","t":"<p>AI不知道你公司的内部鉴权怎么走——别指望它猜。把鉴权封装好、文档写清楚，AI才能正确调用。</p>","n":29},{"s":5,"q":"AI 生成的代码你怎么做自动化测试？AI写测试代码有什么坑？","a":"<p>让AI写测试代码是很好的实践——测试代码模式固定、逻辑简单，AI效率极高。但也有坑。</p><p>让AI写测试的方法：给AI提供函数签名+输入输出示例，要求生成单元测试。给AI提供API文档，要求生成集成测试。给AI提供已知bug的修复代码，要求生成回归测试防止再次出现。</p><p>AI写测试的常见问题：AI测试代码只覆盖快乐路径漏掉边界和异常。AI生成的mock数据太完美不像真实数据。AI生成的测试代码本身可能有bug。</p><p>最佳实践：让AI生成测试大纲如describe和it的骨架，人工补充边界和异常case后让AI填充实现。对计算结果类代码（纯函数）AI测试效果很好，对有状态/IO类代码效果差。</p>","t":"<p>AI写测试是落地最快、风险最低的AI编程场景——因为测试代码错了也不会影响生产环境。</p>","c":"v","n":30},{"s":4,"q":"AI 在代码重构中的作用是什么？你怎么用它做重构？","a":"<p>AI在代码重构中的定位是执行者而非决策者——重构方向和目标由人决定，AI负责具体实施。</p><p>有效方法：给AI看重构前和期望重构后的代码片段，要求AI给出迁移方案。将一个大函数拆成小函数的重构特别适合AI——描述拆分逻辑（每个子函数的职责）由AI实施。跨语言重构最值得用AI（Java到Kotlin、Python到TypeScript），比人手工翻译快几倍。</p><p>注意事项：重构必须要有测试覆盖，AI重构后跑一遍测试验证行为没变。AI可能会在重构中顺手修东西改善变量名优化逻辑——这是好事但需要审查确认。</p><p>AI不适合做的重构：涉及大规模架构变更（微服务拆分、数据库迁移）——AI看不到全局上下文。</p>","t":"<p>AI重构的效率远超人类——前提是重构方向由人定，AI只管执行。</p>","c":"v","n":31},{"s":5,"q":"你怎么用 AI 做代码审查？AI 做 Review 和人有什么区别？","a":"<p>AI做Code Review的方式：作为PR的自动Reviewer，在人工Review之前先跑一遍AI审查。AI擅长发现代码风格问题、命名问题、重复代码、缺少注释、明显的逻辑错误。不擅长发现业务语义偏差、架构问题、性能影响。</p><p>与人的区别：AI审查速度快（几百行代码几秒完成），覆盖全面（每条函数都看），但深度不够。人审查速度慢但能发现深层问题（这个方案本身是不是错了、这段代码未来怎么维护）。</p><p>最佳实践：AI前置审查拦截明显的低级问题，人工审查聚焦在业务语义和架构层面。让AI设定检查清单：安全（输入校验/权限控制）、性能（N+1查询/大循环）、规范（命名/格式/注释）、边界（空值/异常/并发）。设置AI评论的阈值——低于阈值不评论减少噪音。</p>","t":"<p>人+AI结合的代码审查效率最高——AI做第一道防线，人做深度审查。</p>","c":"v","n":32},{"s":4,"q":"AI 在遗留系统改造中有哪些应用场景？","a":"<p>遗留系统是AI编程的高价值场景——老代码文档缺失、开发者已离职、技术栈过时，AI能帮助理解。</p><p>具体应用：代码理解——把一段老代码扔给AI，让它给出功能说明、输入输出、副作用等文档。对没有注释的遗留代码非常有用。语言迁移——把一段老PHP/ASP代码给AI，要求翻译成现代Python/Go。框架升级——把老框架API调用方式给AI，让它迁移到新框架语法。</p><p>实际效果：用AI理解遗留代码的效率比人自己读快3-5倍。但AI对遗留系统中隐含的业务规则不一定理解——结果需要人工核实。</p>","t":"<p>用完AI理解遗留代码后，之前不想碰的老项目突然变得可维护了。这是AI编程的隐藏价值。</p>","c":"v","n":33},{"s":4,"q":"怎么衡量 AI 编程带来的效率提升？有哪些量化指标？","a":"<p>量化AI编程效率是每个团队都该做的——否则老板会问花了这么多AI费用到底值不值。</p><p>量化指标：任务完成时间——同样功能的开发任务用AI前和用AI后的时间对比。注意要测从需求到上线的全链路时间，不只是写代码时间。代码产出量——每日/每周提交代码行数（含AI生成和手写）。但这容易被刷量，所以还要结合质量指标。Bug率——AI生成代码的线上Bug率和手写代码的对比。好的AI实践Bug率不应显著高于手写。开发者满意度——NPS调研你愿意用AI工具做这个任务吗。</p><p>常见误区：只看代码行数不看质量。也不看花在Prompt调试上的时间——如果花1小时写Prompt让AI生成本来30分钟手写的代码就是负收益。</p>","t":"<p>老板会问的题。关键是区分写代码快和交付快——Prompt调试也是时间成本。</p>","c":"v","n":34},{"s":3,"q":"AI 编程对团队协作模式有什么影响？Code Review、知识传递、新人培养怎么变化？","a":"<p>AI编程对团队协作的三方面影响：</p><p>Code Review的变化——Reviewer需要审查AI生成的代码，关注点从代码是否正确变为代码是否正确+AI是否写对了我的意图。后者更抽象更难审。</p><p>知识传递的变化——以前新人通过读代码学业务和规范，现在代码是AI写的——为什么这段代码这么写？AI写的我也不知道为什么——知识传递链条断了。</p><p>新人培养的变化——以前新人通过写代码成长，现在通过Prompt调优和审查AI代码成长。对新人来说读代码（AI给的）变成比写代码更重要的技能。</p><p>应对措施：坚持Code Review制度不变，AI代码走和手写代码同样的Review流程。在commit message中标注AI生成方便后续追查。定期做团队AI使用分享会。</p>","t":"<p>深度题——不是考你会不会用AI，而是考你用AI后团队怎么运作。</p>","c":"v","n":35},{"s":5,"q":"AI 生成的代码和人类写的代码在可维护性上有什么差异？怎么弥合差距？","a":"<p>统计表明AI代码的可维护性在某些方面比人类好、在某些方面差。</p><p>AI代码的优点：函数和变量命名规范（AI倾向于使用清晰的全名而非缩写）、代码结构规整（遵循常见的模式）、注释完备（AI习惯加注释）。</p><p>AI代码的缺点：过度泛化（AI把简单问题复杂化了）、缺少对业务上下文的深层理解（代码跑得通但业务语义可能偏了）、设计模式运用刻板（AI用设计模式但不是最合适的）、隐藏依赖（AI引入了隐式的第三方依赖）。</p><p>弥合差距的做法：在Code Review中重点关注这段代码是否符合我们的业务上下文。给AI读取项目级文档如CLAUIDE.md中的业务规则。对AI生成的代码加单元测试——测试是验证行为是否正确的唯一可靠手段。</p>","t":"<p>AI代码看起来规范但实际可维护性不一定好。原因很简单——AI不理解你们的业务，所以不知道什么设计最合适。</p>","c":"v","n":36},{"s":4,"q":"AI 辅助调试怎么用？遇到线上问题让 AI 帮忙分析吗？","a":"<p>AI调试效率很高但需要正确的方法——把原始错误堆栈直接扔给AI的效果很差。</p><p>有效方法：提供完整的错误信息（堆栈+关键数据+代码上下文），给AI发问的具体格式：这段代码抛出了这样异常……相关代码如下……请分析根因并给出修复方案。对复杂问题分步提问——先让AI理解代码逻辑，再给错误信息，最后问修复方案。三步比一步的效果好很多。</p><p>限制：AI看不到你的数据库状态、第三方API响应、配置信息——这些运行时信息AI无法获取需要你提供。AI不能连接生产环境执行查询——安全限制。AI的调试建议需要人工验证再执行。</p>","t":"<p>AI调试的黄金法则是给上下文越多诊断越准。分段式提问比一次塞完效果好。</p>","c":"v","n":37},{"s":5,"q":"AI 生成的代码出现幻觉（编造不存在的API/函数），怎么发现和处理？","a":"<p>AI代码幻觉是常见问题——AI编造了不存在的API、参数或函数，代码看起来合理但编译不过。</p><p>常见形式：使用了不存在的库函数如pandas.DataFrame.transform_df、虚构了不存在的API参数、编造了不存在的配置选项。</p><p>发现方法：IDE类型检查——TypeScript/Python类型提示能在编码阶段发现大部分幻觉。编译/语法检查——AI生成的代码必须在CI中通过编译。单元测试——编译通过的代码也可能调用幻觉API，跑测试才能发现。</p><p>处理方式：发现幻觉后不要直接修正——把幻觉API和实际API都给AI，要求重新生成。在Prompt中明确要求只使用你确实知道的API，不确定的请标明TODO。为AI提供项目API文档减少幻觉概率。</p>","t":"<p>AI幻觉在代码场景下比在文字场景下更容易发现——要么编译不过要么跑不通。但写得很合理但不存在的API是最危险的。</p>","c":"v","n":38},{"s":4,"q":"AI 在数据库设计中能做什么？不能做什么？","a":"<p>AI在数据库领域是一个有经验的助手但不是专家。</p><p>能做的：表结构设计——给AI业务需求描述，AI能给出合理的表结构和关系。这种设计适合MVP阶段快速启动。索引建议——AI可以基于查询模式建议索引。查询编写——AI写复杂SQL（多表JOIN、子查询、窗口函数）效率很高。ORM代码生成——AI精通各类ORM语法。</p><p>不能做的：查询性能的精确评估——AI无法预估数据量和数据分布对查询性能的影响。数据库选型——AI推荐数据库是基于热门程度不是基于业务场景。高并发下的锁和事务设计——AI对此理解薄弱。</p><p>建议：SQL查询用AI写但必须在测试环境用explain analyze验证执行计划。表结构设计让AI出第一版，DBA/资深工程师审核后上线。</p>","t":"<p>AI写SQL是好手——但SQL写得对和SQL跑得快是两回事。测试环境验证执行计划是必须的。</p>","c":"v","n":39},{"s":4,"q":"用 AI 做跨语言迁移的效率如何？需要注意什么？","a":"<p>跨语言迁移是AI编程的高价值场景——手工迁移耗时费力且容易出错。</p><p>效率：AI做跨语言迁移的速度是手工的5-10倍。大段代码的语法翻译AI表现得很好。但AI不一定理解不同语言的最佳实践——它可能把Java的代码风格翻译到Kotlin（例如不用data class不用扩展函数），导致代码能跑但不是最优的写法。</p><p>注意事项：语言特性适配——在Prompt中要求AI使用目标语言的特性。依赖替换——源语言的第三方库在目标语言可能有不同的替代品，AI不一定选对了需要人工确认。性能差异——不同语言的内存模型和并发模型不同，AI写的代码在目标语言中可能有性能隐患。测试先行——迁移前确保源语言代码有完整测试覆盖，迁移后全部跑通。</p>","t":"<p>跨语言迁移省时间但费审查——AI把语法翻译对了只是基础，让翻译后的代码符合目标语言的习惯用法才是难点。</p>","c":"v","n":40},{"s":5,"q":"AI 编程中怎么处理「Prompt 漂移」——同样的 Prompt 今天和明天得到不同结果？","a":"<p>Prompt漂移是AI编程中的常见问题——同样的描述AI今天写的是这个方案明天写的是另一个方案。</p><p>原因：基座模型版本更新、模型内部随机性（temperature参数）、模型训练数据更新。</p><p>应对策略：锁模型版本——在工具配置中指定具体的模型版本而非最新版。降低temperature——代码生成场景设temperature=0让输出尽可能确定。Prompt模板化——将成功的Prompt保存为模板每次使用完全相同的措辞。多次生成选最优——一次请求生成多个候选方案（n>1），选择或合并最佳方案。对关键代码人工编写而不是依赖AI——频繁漂移的Prompt对应的代码应该手写。</p>","t":"<p>这是AI编程的工程化问题——当AI的不稳定性影响到交付时，需要锁定版本、降低随机性、模板化。</p>","c":"v","n":41},{"s":3,"q":"未来 3 年 Vibe Coding 会怎么发展？程序员还需要学写代码吗？","a":"<p>Vibe Coding 3年的三个趋势：质量门槛提高——现在AI写的代码能跑就行，未来会要求能跑+安全+高性能+可维护。工具链成熟——从单点AI工具发展为全链路AI平台从需求到设计到编码到测试到部署。人机协作深化——从人写Prompt AI写代码到人定方向 AI设计方案 人审核 AI写代码的迭代协作。</p><p>程序员还需要学写代码吗？需要学——但重点变了。不需要精通每一种语言的语法细节，但需要理解计算机原理（数据结构、网络、操作系统、数据库原理）。因为不理解这些就无法判断AI生成的代码对不对、好不好、安不安全。代码能力从写转向读+审+改——能读懂AI生成的代码、能审查逻辑正确性、能在AI搞不定时自己改。</p><p>会用AI的程序员会替代不会用AI的程序员。但不懂计算机原理的程序员会被懂原理的程序员替代——无论用不用AI。</p>","t":"<p>面试终极展望题。关键观点：不是学不学代码的问题，而是学的重心从怎么写转到怎么审的问题。</p>","c":"v","n":42},{"s":5,"q":"在 AIGC 管线中，Python 主要用在哪些环节？为什么 Python 而不是其他语言？","a":"<p>Python在AIGC管线中覆盖了从数据准备到模型部署的几乎全部环节，具体包括：</p><p>① 数据采集与预处理——用Pillow/OpenCV处理图像（裁剪/缩放/增强），用Pandas处理标注数据（JSON/CSV解析），用WebSocket/Requests批量抓取数据。</p><p>② 模型训练——PyTorch/Lightning是AIGC训练的标配，Diffusers库封装了Stable Diffusion的完整训练流程，LoRA训练脚本几乎全部用Python编写。</p><p>③ 推理管线——ComfyUI的自定义节点用Python写，模型推理用torch.inference_mode()，图像后处理用PIL。</p><p>④ API服务——FastAPI搭建模型服务端点，Redis做任务队列，S3做存储后端。</p><p>为什么是Python：AI生态全部在Python上（PyTorch/TensorFlow/Diffusers/Transformers），没有替代语言。其他语言（Go/Rust）在AI生态上几乎空白。</p>","t":"<p>面试官想听的不是Python可以做什么，而是你清楚AIGC的每个环节在Python里用什么库做——数据用OpenCV+Json，训练用PyTorch+Diffusers，部署用FastAPI。</p>","c":"p","n":1},{"s":5,"q":"AIGC 中常用的Python数据处理场景有哪些？你踩过哪些坑？","a":"<p>数据处理占AIGC管线60%的时间，常见场景：</p><p>图像批量处理——用OpenCV批量裁剪/缩放/格式转换，注意色彩空间问题：OpenCV默认BGR，PIL默认RGB，混用时记得cv2.cvtColor(img, cv2.COLOR_BGR2RGB)。内存管理——几千张高分辨率图同时加载会OOM，要用yield生成器分批处理或使用PIL的Image.open()惰性加载。</p><p>标注数据处理——COCO格式的JSON解析、CLIP打标结果清洗。注意大JSON文件用ijson流式解析避免一次性加载到内存。</p><p>坑点：文件系统编码问题（中文路径在Windows上报错，统一用pathlib.Path处理）、多进程数据加载的共享内存泄漏（用torch.utils.data.DataLoader的num_workers需要控制）。</p>","t":"<p>数据处理是AIGC中最容易被低估的环节。面试官想听的不只是你会用OpenCV，而是你踩过什么坑——色彩空间、内存管理、编码问题。</p>","c":"p","n":2},{"s":4,"q":"用 Python 写 ComfyUI 自定义节点时，需要注意什么？数据流是怎么走的？","a":"<p>ComfyUI自定义节点本质是一个Python类，继承自特定基类。核心结构：INPUT_TYPES类方法定义输入参数（图像、模型、参数等），RETURN_TYPES定义输出类型，FUNCTION定义执行方法。</p><p>关键注意事项：输入输出类型声明必须准确——ComfyUI根据类型声明做连线匹配，声明错了用户拖不对。函数接收的是torch.Tensor而非PIL.Image——ComfyUI内部用张量表示图像，维度格式为(batch, height, width, channel)。所有计算在GPU上执行——自定义节点的逻辑尽量用torch操作而不用numpy，避免CPU-GPU传输开销。</p><p>数据流示例：Load Image输出张量→节点接收张量→用torch操作→输出张量→VAE Encode转latent→KSampler处理。</p>","t":"<p>写ComfyUI节点是高阶AIGC技能。面试官想知道你是否理解ComfyUI内部的张量数据流——不是PIL图像，是(batch,H,W,C)的torch.Tensor。</p>","c":"p","n":3},{"s":5,"q":"AIGC 中 Python 做模型推理时怎么优化性能？遇到过哪些瓶颈？","a":"<p>AIGC模型推理的性能瓶颈通常不在计算而在IO和内存管理。</p><p>推理优化：使用torch.inference_mode()替代no_grad()——前者关闭了梯度跟踪和自动混合精度以外的全部功能，速度提升5-10%。使用torch.compile()编译模型——对SD模型可提升20-30%推理速度。FP16推理——model.half()将模型转为半精度，显存减半速度不变。使用xformers或sdpa优化attention计算——减少显存占用。</p><p>批次处理——多张图同时推理比单张逐次推理快（充分利用GPU并行能力），但注意显存限制。</p><p>实际瓶颈：VAE解码是速度瓶颈（Python侧的单步计算），可以用Tiled VAE分块解码。模型加载是IO瓶颈——加载SDXL模型约5-10秒，用模型缓存池复用加载后的模型。</p>","t":"<p>这道题区分会用和懂优化的人。面试官想听的不只是torch.inference_mode()，而是你知道哪一步最慢、为什么慢、怎么针对性优化。</p>","c":"p","n":4},{"s":4,"q":"AIGC 管线中 Python 的异常处理和错误恢复怎么做？模型推理失败怎么办？","a":"<p>AIGC管线中的异常处理比传统软件更复杂——模型推理可能因为显存不足、CUDA错误、模型文件损坏等各种原因失败。</p><p>异常处理策略：显存不足——torch.cuda.OutOfMemoryError捕获后释放缓存torch.cuda.empty_cache()，然后降级（降低分辨率、减少batch size、切换到CPU推理）。模型加载失败——捕获异常后尝试重新下载模型文件，失败后切换到备用模型。推理超时——用signal或asyncio.wait_for设置超时，超时后kill进程并重启worker。</p><p>最佳实践：每个推理请求包裹在try-except块中, 失败时返回标准错误格式而非原始Python异常（避免暴露内部信息）。生产环境中每个模型推理放在独立的子进程中——一个进程崩溃不影响其他请求。关键路径上做fallback——模型推理失败时返回降级结果而非直接报错。</p>","t":"<p>线上模型服务的稳定性是面试重点。面试官看重的是你有没有兜底机制——不是「代码不出错」，而是「出错后有应急方案」。</p>","c":"p","n":5},{"s":5,"q":"AIGC 中怎么用 Python 做批量图像/视频的数据增强？有哪些库和策略？","a":"<p>数据增强在AIGC训练中至关重要——好的数据增强让LoRA训练效果提升30%以上。</p><p>常用库：Albumentations——图像增强库，支持随机裁剪/旋转/颜色抖动/模糊，性能优于torchvision.transforms。imgaug——更丰富的增强序列，支持同时增强图像和关键点。Kornia——基于PyTorch的增强，可GPU加速。</p><p>增强策略：几何变换——随机水平翻转、小角度旋转(±10度)、随机裁剪(保持主体)。色彩增强——亮度/对比度/饱和度随机变化、色相微调(±5度)。噪声模拟——高斯噪声、JPEG压缩模拟（让模型适应低质量输入）。CutMix/CutOut——随机遮挡部分区域，提高模型对遮挡的鲁棒性。</p><p>注意：增强不能改变训练数据的核心特征——角色服装的颜色不能变、面部关键点不能偏移过大。</p>","t":"<p>数据增强直接影响模型训练效果。面试官想听的不是你知道哪些库，而是你知道什么场景用什么增强策略、什么不能增强。</p>","c":"p","n":6},{"s":4,"q":"AIGC 中 Python 的异步处理（asyncio）用在哪些场景？和传统多线程有什么区别？","a":"<p>AIGC中的异步场景：批量推理请求——多个用户同时请求AI生图，用异步队列管理避免互相阻塞。API服务——FastAPI天然支持异步，每个请求不阻塞其他请求。文件IO——上传下载大模型文件时用异步避免卡住主线程。WebSocket通信——实时推送推理进度。</p><p>和传统多线程的区别：asyncio是协作式并发——一个协程await时主动让出控制权。多线程是抢占式并发——操作系统随时切换线程。asyncio适合IO密集型（等待网络/磁盘），多线程适合CPU密集型（图像处理/模型推理）。</p><p>在AIGC中通常结合使用：asyncio管理请求调度，多进程处理模型推理（因为GIL限制，单进程无法充分利用多核GPU）。</p>","t":"<p>考察Python并发编程的理解。关键点：AIGC管线既有IO等待（文件/网络）又有CPU计算（推理），需要asyncio+多进程结合。</p>","c":"p","n":7},{"s":4,"q":"AIGC 中 Python 的依赖管理和环境隔离怎么做的？踩过什么版本冲突的坑？","a":"<p>AIGC项目的依赖管理是出了名的头疼——PyTorch/CUDA/Transformers/Diffusers之间的版本兼容性极其复杂。</p><p>常用方案：Poetry——推荐。比pip更严格的依赖解析，自动处理子依赖冲突。但注意有些AIGC库（如xformers）不支持Poetry，需要手动添加。Conda——对CUDA版本管理更友好，可以创建不同CUDA版本的独立环境。Docker——生产环境标准方案，锁定了从CUDA到Python库的全部版本。</p><p>踩过的坑：PyTorch+CUDA版本不匹配——安装PyTorch时CUDA版本必须和驱动一致，否则torch.cuda.is_available()返回False。Diffusers+Transformers版本锁定——新版Diffusers可能依赖新版Transformers，升级Diffusers后Transformers自动升级导致API变更。xformers+PyTorch版本绑定——xformers的预编译包只支持特定PyTorch版本。</p><p>最佳实践：项目中用requirements.txt或pyproject.toml锁定全部依赖版本（不用>=用==）。在README中标注经过测试的CUDA+PyTorch版本组合。CI中定期更新并测试依赖。</p>","t":"<p>依赖管理水平直接反映工程化能力。面试官想知道的是你踩过坑并总结出了解决方案——锁版本、兼容性测试、Docker化。</p>","c":"p","n":8},{"s":4,"q":"AIGC 中 Python 读取大模型文件（safetensors/ckpt）时怎么优化 IO？遇到过什么问题？","a":"<p>AIGC中的模型文件动辄几个GB到几十GB，IO效率直接影响启动和切换速度。</p><p>优化方法：safetensors格式比ckpt快——safetensors是零拷贝加载，不需要pickle反序列化，加载速度提升2-5倍。mmap内存映射——safetensors支持mmap模式，只加载实际使用的张量到内存，而不是整个文件。懒加载——只在需要用某个模型权重时才加载该权重，而不是一启动就把所有模型加载到内存。权重缓存——服务器启动时预加载常用模型到GPU显存，切换时只需替换LoRA权重（小而快）。</p><p>遇到过的问题：硬盘IO瓶颈——同时加载多个大模型时磁盘IO打满，用SSD/NVMe缓解。Python进程内存泄漏——模型加载卸载频繁时OS不立即回收内存，用子进程隔离模型加载。</p>","t":"<p>大模型文件IO是AIGC工程化的常见瓶颈。面试官想看你知道safetensors和ckpt的区别、知道mmap懒加载这些优化手段。</p>","c":"p","n":9},{"s":3,"q":"AIGC 中怎么用 Python 做 Prompt 模板管理和 Prompt 工程？","a":"<p>Prompt工程在Python中不只是字符串拼接，而是一套结构化管理方法。</p><p>模板管理：用Jinja2模板引擎管理Prompt模板——将固定的system prompt、可变的user prompt、上下文分开。用YAML/JSON配置文件管理不同场景的Prompt，而非硬编码在Python代码中。版本控制——Prompt模板和代码一起进Git，通过diff追踪Prompt变更。</p><p>Python实现：使用f-string或string.Template做参数替换。对复杂Prompt（含条件逻辑/循环）使用Jinja2模板。批量Prompt测试——用Python脚本遍历prompt模板+参数组合，调用API测试效果。Prompt版本管理——用dataclass定义Prompt版本结构，管理不同版本的Prompt。</p>","t":"<p>这不是高级问题但很实用。面试官想看你有工程化思维——Prompt不是字符串而是可管理的模板资产，需要版本、参数、测试。</p>","c":"p","n":10},{"s":5,"q":"AIGC 中 Python 调用第三方 API（如 OpenAI/DALL-E/ Claude）时的限流和重试策略怎么设计？","a":"<p>AIGC中频繁调用第三方AI API，限流和重试是必备能力。</p><p>限流策略：Token Bucket令牌桶算法——控制每秒请求数, 超出的请求排队或降级。使用aiolimiter或pyrate-limiter库实现。队列缓冲——所有API请求先进入队列，消费者按固定速率取出执行。优先级队列——对高优请求（用户在线等待）和低优请求（后台批量处理）分开处理。</p><p>重试策略：指数退避——第N次重试等待2^N秒（1,2,4,8...），最大等待时间30秒。错误类型区分——429（限流）必须等待重试，5xx（服务端错误）可立即重试，4xx（参数错误）不重试。重试超过3次后降级——返回缓存结果或提示用户稍后再试。</p><p>代码实现：使用tenacity或backoff库实现重试，比手写try-catch更可靠。</p>","t":"<p>调用第三方API的可靠性是生产环境的核心问题。面试官想听的不是你用过requests，而是你有系统的限流重试策略。</p>","c":"p","n":11},{"s":4,"q":"Python 中怎么做 AIGC 模型的自动化评测？评价生成的图片/文本质量的指标有哪些？","a":"<p>AIGC模型的评测比传统模型更难——没有单一的准确率指标，主观性强。</p><p>图像质量评价：FID（Fréchet Inception Distance）——生成图像和真实图像的特征分布距离, 越低越好。CLIP Score——生成图像和prompt的相关性, 越高越好。Aesthetic Score——图像美观度的模型打分。人工AB测试——最可靠但成本最高, 让标注员在两组图像中选择更好的。</p><p>文本质量评价：BLEU/ROUGE——生成文本和参考文本的n-gram重合度（适合caption任务）。BERTScore——基于BERT的语义相似度（比BLEU更准）。GPT评估——用GPT-4给生成文本打分（1-5分）。</p><p>Python实现：torchmetrics库提供FID/CLIP Score等指标的计算。OpenAI API做GPT评估打分。Streamlit搭建人工评测界面——展示图像让标注员选择。</p>","t":"<p>评测是AIGC项目中最容易被忽视的环节。面试官想看你有量化意识——不只说「看起来不错」，而是有FID/CLIP Score等客观指标。</p>","c":"p","n":12},{"s":3,"q":"Python 中怎么处理 AIGC 项目的配置管理？训练参数、推理参数怎么组织？","a":"<p>AIGC项目的参数极多（模型选择/学习率/分辨率/步数/CFG/种子……），没有良好管理的配置会让人崩溃。</p><p>最佳实践：使用Hydra或OmegaConf管理配置——支持YAML配置文件层级覆盖（默认配置→环境配置→命令行覆盖）。将训练参数、推理参数、模型路径、数据路径分开放置不同配置文件。运行时参数（seed/batch_size）通过命令行传参覆盖YAML默认值。</p><p>示例结构：configs/training/base.yaml（默认训练参数）, configs/model/sd15.yaml（模型相关参数）, 运行时python train.py --config-dir configs --config-name training +batch_size=8。所有实验记录自动保存config、日志、模型权重到一个实验目录。</p>","t":"<p>配置管理看起来简单但直接影响实验可复现性。面试官想看你知道Hydra/OmegaConf这类工具，知道怎么组织多级配置。</p>","c":"p","n":13},{"s":4,"q":"Python 中怎么做 AIGC 模型的版本管理？训练了10个LoRA怎么区分、加载、组合？","a":"<p>AIGC项目中会快速积累大量模型文件——不同角色LoRA、不同风格LoRA、不同训练版本的checkpoint。</p><p>模型版本管理方案：命名规范——统一命名格式{类型}_{主体}_{日期}_{版本}.safetensors, 如lora_akali_20260415_v2.safetensors。元数据管理——在模型文件旁边存一个同名JSON文件, 记录训练参数、底模版本、效果预览图。数据库管理——对大量模型（100+）用SQLite记录模型元数据, 支持按类型/日期/效果评分搜索。</p><p>加载策略：LoRA权重缓存池——将所有LoRA预加载到Dict中, key为LoRA名称, 用户切换时只需更新权重不需要重新加载。组合验证——组合使用多个LoRA时预先跑一组测试prompt验证效果是否正常。冲突检测——检测两个LoRA是否修改了同一层的attention权重, 提示用户可能的冲突。</p>","t":"<p>模型多了以后管理不好会非常混乱。面试官想看你有从项目开始就考虑模型管理的意识——命名规范、元数据、组合验证。</p>","c":"p","n":14},{"s":5,"q":"生图时脸部崩坏（崩脸）是什么原因？怎么解决？","a":"<p>崩脸是AIGC中最常见的质量问题。根因是SD模型在低分辨率下对人脸的理解能力有限——512x512下人脸区域只有几十像素，模型很难精确控制五官位置和比例。</p><p>解决方法分层：采样参数调整——增加Steps到30-40让模型有更多时间去噪修复。使用Euler a或DPM++ 2M Karras采样器，它们对人脸细节保留更好。</p><p>插件方案——使用ComfyUI-Impact-Pack的Face Detailer节点，先检测人脸区域再局部高清重绘，是目前最成熟的方案。或者用After Detailer（ADetailer）插件做全局脸部修复。</p><p>模型方案——使用专门训练的人脸修复模型如CodeFormer或GFPGAN串联在管线末端做后处理。或者换用对脸更友好的底模——SDXL对人脸的支持远好于SD1.5。</p><p>Prompt优化——在negative prompt中加bad hands, bad face, deformed limbs, extra fingers。在positive prompt中加detailed face, sharp facial features, high quality face。</p>","t":"<p>崩脸是最常见的用户反馈。面试官想看你知道的是分层解决而不是只靠加negative prompt——从采样器到插件到模型有多条路。</p>","c":"c","n":13},{"s":4,"q":"生成的图像出现大面积黑白噪点/彩色噪点，是什么原因？怎么解决？","a":"<p>噪点问题通常不是模型问题而是管线配置问题。</p><p>常见原因：VAE不匹配——用了和模型不匹配的VAE会导致解码出错，尤其常见于混搭SD1.5的VAE到SDXL模型或反之。修复方法——确保VAE和模型属于同一系列（SD1.5/SDXL/Flux各系列VAE不同）。</p><p>CFG值过高——CFG>15时模型在过度引导下产生噪声积累，表现为彩色噪点。把CFG降到7-10之间即可恢复。</p><p>Steps太少——steps<15时去噪不充分，残留噪声在解码后变成噪点。增加到25-30步。</p><p>denoise值异常——img2img时denoise>0.8可能导致输出噪点。降到0.4-0.7。</p><p>模型文件损坏——下载的模型文件不完整也会产生噪点。用SHA256校验模型文件完整性。</p>","t":"<p>面试官想听的不是你知道有噪点，而是你能快速定位是VAE问题还是CFG问题还是Steps问题——不同根因的噪点形态不同，解法也不同。</p>","c":"c","n":14},{"s":5,"q":"Negative Prompt（反向提示词）为什么有效？怎么写才能效果好？","a":"<p>负向prompt在扩散模型中作用于Classifier-Free Guidance机制。采样时模型同时计算有条件预测（基于正向prompt）和无条件预测（基于负向prompt），最终输出在两者之间插值。负向prompt告诉模型「不要往这个方向生成」。</p><p>效果好写法：写具体而非抽象——bad hands比bad quality好，因为模型对「bad quality」的理解模糊但对「bad hands」有具体的视觉记忆。覆盖常见崩坏类型——extra fingers, deformed hands, missing limbs, blurry, low quality。针对场景优化——生成人物时重点加人体相关负面词，生成风景时不需要。</p><p>常见错误：负面词过长——不一定会更好, 反而可能抑制正向prompt的效果。一般5-10个关键词足够。矛盾指令——在正向里写了cinematic lighting又在负向里写bad lighting等于没写。</p>","t":"<p>面试官想听的不只是你知道负向prompt有用，而是你知道它为什么有用（CFG插值机制）以及怎么写才真正有效。</p>","c":"c","n":15},{"s":4,"q":"同样的 Prompt、同样的 Seed、同样的参数，为什么两次生成的结果不一样？怎么保证可复现？","a":"<p>可复现性是AIGC中的常见问题——同参数不同结果让调试变得困难。</p><p>原因：模型内部的随机性——即使seed固定，不同批次的PyTorch计算在GPU上由于CUDA的非确定性算法（如atomicAdd）会产生微小差异。xformers的非确定性——启用xformers优化后attention计算变成非确定性。ComfyUI版本差异——不同版本的ComfyUI对默认参数的处理可能不同。模型加载顺序——多个LoRA加载的顺序影响最终结果。</p><p>保证可复现的方法：设置torch.backends.cudnn.deterministic = True和torch.use_deterministic_algorithms(True)。禁用xformers或使用确定性attention实现。固定ComfyUI版本和所有自定义节点版本。记录完整的生成参数（不仅包括prompt/seed/CFG/steps，还包括sampler_name/scheduler/VAE名称/模型文件名）。</p><p>实际限制：完全确定性的生成速度会降低30-50%。对生产环境建议保留确定性模式，对探索阶段可以放宽。</p>","t":"<p>这是一道踩过坑才知道的题。面试官想看你知道seed只是可复现的一个维度——还有CUDA确定性、xformers、模型加载顺序。</p>","c":"c","n":16},{"s":4,"q":"不同采样器（Sampler）和调度器（Scheduler）的区别是什么？怎么选？","a":"<p>采样器决定如何去噪，调度器决定去噪步长分布。两者组合决定了生成速度和质量。</p><p>常用采样器：Euler——最基础，速度快但细节少。DPM++ 2M——比Euler细节更丰富，速度相近，推荐。DPM++ 2S a——比2M略慢但质量略高。DDIM——可做inversion（图生图反推原图）。LCM——极速采样，4-8步即可，但质量有损。</p><p>常用调度器：normal——均匀分布去噪步长，最通用。karras——在关键区域（高噪声区域）分配更多步长，质量更好但稍慢。exponential——指数分布。sgm_uniform——SDXL推荐。</p><p>选型建议：日常生图用DPM++ 2M Karras，平衡速度和质量的通用选择。追求质量用DPM++ 2S a Karras。极速场景用LCM+LCM调度器。img2img用DDIM。</p><p>注意事项：不是所有采样器+调度器组合都有效——DPM++ SDE Karras和DDIM normal是有效组合，但LCM scheduler只能配合LCM采样器。</p>","t":"<p>这道题区分会用和懂的人。面试官想听的不只是你记得DPM++ Karras好用，而是你知道采样器管什么、调度器管什么、怎么组合。</p>","c":"c","n":17},{"s":4,"q":"Hires.fix（高清修复）的 denoise 值怎么设？设得不对会有什么问题？","a":"<p>Hires.fix的denoise值是高清修复效果好坏的关键参数。</p><p>denoise的作用：控制放大后重绘的幅度。0.3-0.4是多数场景的甜点区——加细节的同时保留原图构图。</p><p>设得太高（>0.6）：放大后基本在重画——原图的主体位置、姿势、表情都会变化，角色一致性丢失。这违反了高清修复的本意——加细节而非再造。</p><p>设得太低（<0.2）：几乎不做重绘——放大后只有分辨率提高但细节没有丰富，就没有高清修复的意义。</p><p>场景化建议：写实风格设0.3-0.35（对细节要求高但变体不要多），二次元风格设0.35-0.5（对构图容忍度更高）。SD1.5升级到SDXL的放大建议设0.4-0.5。</p><p>注意：Hires.fix的denoise和KSampler的denoise不是同一个参数——前者控制放大后重绘，后者控制原图去噪。新手容易混淆。</p>","t":"<p>面试官想听的是你有校准denoise的方法论而非死记硬背某个值——不同场景设不同值、知道太高和太低分别有什么后果。</p>","c":"c","n":18},{"s":3,"q":"不同 VAE 对生成效果有什么影响？不同模型应该用哪个 VAE？","a":"<p>VAE（变分自编码器）负责将图像的latent表示解码为像素图像，也在训练时将像素图像编码为latent。VAE的质量直接影响图像的颜色、锐度和细节。</p><p>VAE的作用：好的VAE让颜色更饱和、对比度更高、细节更锐利。不同的VAE有不同的色彩偏好——有的倾向暖色有的倾向冷色。VAE也影响皮肤的肤色和质感。</p><p>常见VAE选择：SD1.5系列——vae-ft-mse-840000是通用选择，色彩艳丽细节丰富。SDXL系列——SDXL官方自带的VAE（sdxl_vae.safetensors）就是最佳选择。Flux——Flux模型自带VAE不需要另外加载。</p><p>注意事项：VAE必须匹配模型系列——SD1.5的VAE不能用在SDXL上会导致色彩偏移和噪点。不同VAE可以混搭测试效果（如用SDXL模型+其他VAE测试颜色风格），但色彩可能会偏离预期。</p>","t":"<p>这道题区分配置能力和排查能力。面试官想听的不是你知道有哪些VAE，而是你知道VAE影响什么、怎么选、不匹配会怎样。</p>","c":"c","n":19},{"s":4,"q":"CLIP Skip 是什么？调高或调低会有什么影响？","a":"<p>CLIP Skip指在使用CLIP文本编码器时跳过最后N层的输出。SD模型默认使用CLIP的最后层输出作为条件。不同层编码了不同粒度的语义信息——浅层编码具体细节（颜色/纹理），深层编码抽象概念（主题/风格）。</p><p>CLIP Skip=1（默认）：使用最后一层，主题和风格表达最充分，但细节跟随性稍弱。</p><p>CLIP Skip=2：跳过最后一层使用倒数第二层，细节跟随性更好（更听话），但风格表达可能减弱。对需要精确控制细节的场景（如Stable Diffusion 2.1）推荐。</p><p>CLIP Skip=3以上：跳过太多层，模型失去对抽象概念的理解，生成的图像主题混乱，一般不推荐。</p><p>适用场景：SD1.5默认不用调。SD2.1建议设2。写实肖像设1不变更。精细控制元素位置设2。</p>","t":"<p>面试官想看你知道CLIP不是一整块使用的——不同层编码不同信息，跳过最后一层是权衡细节和主题的质量。</p>","c":"c","n":20},{"s":4,"q":"图生图（img2img）时原图保留程度怎么精准控制？denoise和重绘幅度有什么区别？","a":"<p>图生图时控制原图保留程度的核心是理解noise叠加和mask机制的配合。</p><p>denoise控制整体重绘程度——0.3轻修（改颜色/微调细节），0.5半重画（改构图/换背景），0.8以上接近重画。</p><p>但只靠denoise不够精细——配合Mask可以实现局部控制。用Inpaint（局部重绘）节点指定想要修改的区域，unmasked区域完全不变。</p><p>进阶技巧：多层mask——脸用低denoise（0.2只加细节），背景用高denoise（0.6换背景）。ControlNet配合——在img2img时用ControlNet Canny约束边缘结构，这样即使denoise=0.6也保持原图轮廓。Latent upscale+img2img——先放大latent再img2img, 效果比直接放大再img2img好。</p>","t":"<p>面试官想听的不只是denoise越大变化越大——而是你知道denoise+mask+ControlNet三个维度的组合控制可以实现精细控制。</p>","c":"c","n":21},{"s":4,"q":"batch_size > 1 时生成的图之间有关联吗？怎么让同批次每张图都不同？","a":"<p>batch_size>1时同批次生成的图在种子基础上有关系——ComfyUI的种子计算规则是batch内用seed_i = base_seed + i。所以batch_size=4时4张图的种子分别是seed, seed+1, seed+2, seed+3。</p><p>实际关联——如果base_seed固定, 同批次的不同图差异不大, 因为相邻种子的初始噪声图高度相似。增强差异的方法——使用随机种子而非固定种子。batch_size=4时每个图独立随机种子。或者使用不同的初始噪声通过噪声注入实现更多样性。</p><p>注意坑：batch内所有图使用相同的prompt——如果想每张图不同prompt, 需要为每个batch slot单独指定prompt而非用一个prompt铺满batch。ComfyUI中可以用Latent Batch节点拼接不同latent后分别设置条件。相比batch，队列单张生成+不同seed是更简单可靠的方式。</p>","t":"<p>面试官想看你知道batch_size的种子生成规则以及batch内差异小的根因——相邻种子噪声相似。什么时候该用batch、什么时候该用队列是判断力。</p>","c":"c","n":22},{"s":5,"q":"为什么有些图生成后手臂/手指数量不对？模型为什么不理解解剖结构？","a":"<p>手指和手臂数量错误是SD模型的经典问题，根因在于模型对频率较低或空间占比较小的人体细节理解不足。</p><p>根因：训练数据的偏差——训练集中含手的图像相对较少，且手部在图像中占的空间小，模型对它的特化学习不足。自注意力的限制——在SD的latent空间（64x64）中，手指只有几个像素对应，模型难以精确控制每个手指的位置和数量。</p><p>阶梯解决：拒绝最差的图——批量生成（同prompt跑10张）只选手部正常的。插件修复——使用Adetailer、Face Detailer等插件对检测到手部区域的局部做高清重绘。负向prompt——extra fingers, missing fingers, deformed hands作为负向词可以部分抑制。手部LoRA——在CivitAI下载专门的手部增强LoRA，加载后可以显著改善手部质量。换用SDXL——SDXL对手部的理解远好于SD1.5（因为高分辨率训练）。controlnet开手部关键点——用OpenPose手部关节点约束手部姿态。</p>","t":"<p>面试官想看你知道这背后是模型的结构性缺陷而非参数问题——数据偏差+空间分辨率不足。知道这点才知道为什么单靠调参数很难彻底解决。</p>","c":"c","n":23},{"s":3,"q":"色彩偏移/颜色不准——生成的图颜色和预期不符，怎么排查和调整？","a":"<p>色彩偏移通常不是模型画错了，而是管线配置问题。</p><p>排查步骤：VAE检查——换VAE测试颜色是否变化。不同的VAE有不同的色彩倾向，如果颜色过于饱和或黯淡可能是VAE不匹配。Clip Skip检查——CLIP Skip=2可能减弱模型对色彩描述的跟随性。CFG检查——CFG过高会导致颜色过饱和，CFG过低会让颜色变淡。</p><p>Prompt调整——在prompt中显式指定颜色（vibrant colors, saturated, warm tones或muted colors, pastel, soft tones）。使用Color Shift类LoRA——CivitAI上有很多专门的颜色调校LoRA。后处理——用Python做色相/饱和度/亮度微调，或者用ComfyUI的ColorCorrect节点。</p>","t":"<p>面试官想看你有系统排查思路而只不是换模型——从VAE到CFG到Prompt分层排查，最后才考虑后处理。</p>","c":"c","n":24},{"s":5,"q":"背景和主体融合不好——主体边缘模糊或者背景乱入到主体上，怎么优化？","a":"<p>背景和主体的区分不清是构图层面的问题。</p><p>根因：模型将背景特征错误地扩散到主体区域——prompt中背景描写过多或主体prompt强度不够。</p><p>解决方案：Prompt权重分配——主体的权重高于背景的权重。例如(detailed person:1.3), (beach background:0.8)。控制背景复杂度——在prompt中指定简单的背景（plain background, simple background, solid background）。负向prompt——在负向prompt中加入背景干扰词（complicated background, messy background）。</p><p>技术方案：使用Mask——先生成主体（抠图后得到mask），再用mask+ControlNet+重绘生成背景。或者先全图生成再用inpaint擦除不需要的部分。</p>","t":"<p>面试官想看你知道这是prompt权重和生成策略的问题——不是模型画不好，是prompt没有告诉模型哪里是主体哪里是背景。</p>","c":"c","n":25},{"s":4,"q":"不同 Checkpoint（底模）之间的区别是什么？怎么选合适的底模？","a":"<p>底模是AIGC效果的基础——同样prompt在不同底模上的输出差异巨大。</p><p>底模的区别：训练数据不同——写实模型（Realistic Vision/ChilloutMix）训练于真实照片，适合摄影级输出。二次元模型（Anything-V5/NovelAI）训练于动漫插画，适合二次元输出。混合模型（Dreamshaper）覆盖更广但专项不如专精模型。分辨率不同——SD1.5系列原生512x512，SDXL原生1024x1024。风格特性差异——有的底模倾向高饱和度，有的倾向低对比度。</p><p>选型建议：明确输出风格优先——写实/二次元/科幻/手绘需要不同底模。查CivitAI上该底模的例图——看是否能产出你想要的风格效果。考虑兼容性——SDXL底模的插件/ControlNet/LoRA支持和SD1.5不同。多底模对比测试——同prompt+同seed在不同底模上跑对比图。</p>","t":"<p>面试官想看你知道底模不是越新越好而是越贴合场景越好——选底模的第一标准是输出风格匹配度而非模型版本。</p>","c":"c","n":26},{"s":4,"q":"ControlNet 各模型（Canny/Depth/OpenPose/MLSD/Scribble）什么时候用哪个？怎么选？","a":"<p>每个ControlNet模型控制的是图像的不同维度。选择取决于你想约束什么。</p><p>Canny（边缘检测）——控制主体轮廓和结构，适合「保持这个物体形状但改变风格/颜色」。不给颜色约束只给形状约束，让模型自由发挥颜色和纹理。</p><p>Depth（深度图）——控制空间层次和透视关系，适合「保持这个3D场景但改变物体外观」。Depth约束了远近关系但允许物体形状变化，比Canny更宽松。</p><p>OpenPose（姿态检测）——控制人体姿态和骨架，适合「让这个人摆这个姿势但长相/服装可改」。只约束姿势不约束外形。</p><p>MLSD（直线检测）——控制建筑结构的直线边缘，适合「室内设计/建筑外景」保持透视结构。</p><p>Scribble（涂鸦）——粗线条草稿控制，适合「画师涂鸦转精修」。和Canny的区别是Scribble接受手绘草稿。</p><p>实践建议：2D插画优先Canny+Scribble，写实摄影优先Depth+Canny，人物姿态用OpenPose，建筑空间用MLSD+Depth。</p>","t":"<p>面试官想看的不只是你知道有哪些型号, 而是知道每个控制什么维度——形状/空间/姿态/结构/涂鸦——不同场景选不同的控制维度。</p>","c":"c","n":27},{"s":4,"q":"AIGC 中怎么用 Python 批量处理生成结果的去重和相似度过滤？","a":"<p>批量生成时会有大量相似图——同prompt不同seed的图可能有90%以上相似。手动筛选低效, 需要自动去重。</p><p>图像相似度计算方法：结构相似性——SSIM（Structural Similarity Index），对缩放到相同尺寸的两张图逐像素比较结构。适合检测几乎相同的图。感知哈希——pHash或dHash将图转为哈希值（64bit），两张图的汉明距离<10认为相似。速度快适合大规模去重。特征匹配——用SIFT或ORB提取特征点, 匹配特征点数量判断相似度。对旋转/缩放更鲁棒。深度学习特征——用预训练CNN提取图像embedding, 计算cosine相似度。精度最高但需GPU。</p><p>去重策略：第一步用pHash快速去重（去掉99%的完全相同图），第二步用SSIM检测微调差异（裁切/颜色差异），第三步人工审核确认。在生成管线中实时去重——每生成一张就和已选图比较, 已经相似的跳过。</p>","t":"<p>面试官想看你知道批量生成时去重是刚需——一张一张手动看几小时不现实。知道不同精度的去重要求不同算法。</p>","c":"p","n":15},{"s":4,"q":"AIGC 中 Python 怎么处理图像元数据（PNG Info/EXIF）？怎么把生图参数写进图片？","a":"<p>AIGC生成的图像需要记录生成参数方便后续复现——prompt/seed/CFG/模型等信息需要嵌入到图像文件中。</p><p>PNG Info的读写：ComfyUI生成的PNG图像在tEXt块中存储完整工作流JSON。用PIL的PngImagePlugin读取——img.info['prompt']或img.text获取元数据。写元数据——创建PngInfo对象, 调用add_text添加键值对后保存。</p><p>实践应用：建立图像数据库——批量提取目录下所有PNG的元数据存入SQLite，支持按prompt/seed/模型搜索。复现功能——读取历史图像的元数据自动填入ComfyUI API参数重新生成。版本回溯——比较不同版本同一prompt+seed的生成结果做效果对比。</p><p>注意事项：有损压缩会丢弃元数据——PNG无损保留元数据但文件大，JPG不保留。不同工具写入的元数据格式不同——WebUI和ComfyUI的元数据格式不兼容。</p>","t":"<p>面试官想看你知道生成参数可以嵌入图像文件本身——这看似小功能但对复现和管理大量生成图像非常关键。</p>","c":"p","n":16},{"s":3,"q":"Python 中怎么实现图像批量加水印/标注？AIGC 生成图需要标注避免版权争议。","a":"<p>AIGC生成图的标注和打水印不仅是品牌需求，在合规上也有必要——避免他人盗用或用于不当用途。</p><p>水印方案：用PIL的ImageDraw+ImageFont在图像上写入文字——透明半角水印不破坏图像视觉效果。选择水印位置——右下角是标准位置, 也可以平铺水印防裁切。批量处理——用Python脚本遍历目录, 对每张图执行相同的水印操作。</p><p>标注信息：生成日期+使用的模型+版权声明——「生成于2026-04-15, 使用SDXL+LoRA_akali_v2, © 2026」。元数据嵌入——在PNG的tEXt块中写入生成参数, 在JPG的EXIF中写入版权信息。</p><p>自动化：在ComfyUI输出节点后接一个Python脚本节点, 每张图生成后自动加水印+写入元数据。或者写一个文件监视脚本——监测输出目录的新文件, 自动处理。</p>","t":"<p>面试官想看你有版权合规意识。不是所有团队都会要求这个, 但有意识地从管线端加入标注是工程成熟的标志。</p>","c":"p","n":17},{"s":4,"q":"AIGC 中怎么用 Python 搭建批量生图的 API 服务（异步任务队列）？","a":"<p>批量生图需要异步任务队列——用户提交请求后不阻塞等待, 后台生成完成后通知。</p><p>架构：FastAPI接收请求→将参数写入Redis队列→Worker从Redis拉取任务执行生成→结果写入存储→用户轮询/WebSocket通知获取结果。</p><p>代码框架：FastAPI定义POST /generate端点, 接收prompt/参数/回调URL。将任务推送到Redis列表（用rpush/lpop做队列）。Worker进程（独立运行）从Redis取任务, 调用ComfyUI API或本地推理。生成完成后将结果URL写入Redis或调用回调URL通知用户。</p><p>关键设计：任务状态管理——pending/running/completed/failed四个状态, 用户可通过GET /status/{task_id}查询进度。并发控制——控制同时运行的worker数不超过GPU数, 避免显存竞争。失败处理——任务超时（默认300秒）自动标记失败, 用户可重新提交。</p>","t":"<p>面试官想看你知道AI推理服务不是同步请求的——生图需要几秒到几分钟, 必须用异步队列。这是工程化思维的基本体现。</p>","c":"p","n":18},{"c":"a","n":35,"q":"Harness Engineering 的核心定义和公式是什么？和 Prompt Engineering 有什么区别？","a":"<p><b>核心公式：</b></p><p><b>Agent = Model + Harness</b></p><p>模型提供推理能力（大脑），Harness 是模型之外的整套系统——工具、记忆、约束、反馈、执行环境和安全边界，让 Agent 稳定可靠地执行复杂任务。类比：模型是 CPU，Harness 是操作系统。</p><p><b>与 Prompt Engineering 的区别：</b></p><p>Prompt Engineering 解决「怎么把指令说清楚」，让模型理解意图；Context Engineering 解决「该给 Agent 看什么」，在合适时机提供正确信息；Harness Engineering 解决「系统怎么持续执行、纠偏、观测和恢复」，是最高层的方法论。</p>","t":"<p><b>面试官想考察什么：</b>是否理解 AI Agent 从 Demo 到生产的关键瓶颈——问题往往不在模型，而在环境设计。</p><p><b>回答思路：</b>先亮出核心公式 Agent = Model + Harness，这是 HashiCorp 联合创始人 Mitchell Hashimoto 在 2026 年 2 月提出的概念。然后解释三层的递进关系（Prompt → Context → Harness），说明 Harness 是最高阶的工程实践。</p><p><b>进阶点：</b>提到「模型瓶颈假象」——很多 Agent 场景里卡住效果的是 Harness 而不是模型，仅改变工具调用格式效果可相差十倍。</p>","s":5},{"c":"a","n":36,"q":"Harness Engineering 的六层架构是什么？","a":"<p>一个成熟的 Harness 通常分为六层：</p><p><b>L1 信息边界层</b>——Agent 该知道什么、不该知道什么。角色定义、信息裁剪、渐进式披露。</p><p><b>L2 工具系统层</b>——Agent 怎么和外部世界交互。工具选择、调用时机、结果提炼反馈。</p><p><b>L3 执行编排层</b>——多步骤任务怎么串起来。理解目标 → 判断信息 → 分析 → 生成 → 检查的轨道推进。</p><p><b>L4 记忆与状态层</b>——长任务中间结果怎么管理。任务状态、中间产物、长期记忆独立管理。</p><p><b>L5 评估与观测层</b>——Agent 怎么知道自己做对了。独立于生成过程的验证机制、日志指标。</p><p><b>L6 约束、校验与恢复层</b>——出错了怎么办。预设规则拦截、重试、回滚、降级。</p><p><b>实践建议：</b>不要一上来做六层。先做 L1 和 L6，中间层逐步补充。</p>","t":"<p><b>面试官想考察什么：</b>对 Agent 工程的系统性理解，能否从架构高度思考问题。</p><p><b>回答思路：</b>从下到上逐层解释，强调每层解决的具体问题。最后一定要补充「先做 L1+L6」的实践建议——显示你有落地经验而不是只会背书。</p><p><b>加分项：</b>提到上下文利用率 40% 阈值——上下文用到约 40% 时 Agent 输出质量开始明显下降，目标不是塞更多信息而是让 Agent 停留在干净上下文里。</p>","s":4},{"c":"a","n":37,"q":"Harness Engineering 的四大核心组件（四大护栏）是什么？","a":"<p><b>① 上下文工程（Context Engineering）</b>——Agent 不知道该看什么、怎么找。代表实践：AGENTS.md 活文档、按需检索、动态知识注入。AGENTS.md 每一行对应一个历史 Agent 失败案例。</p><p><b>② 架构约束（Architecture Constraints）</b>——Agent 复制并放大坏模式。代表实践：分层依赖模型（Types→Config→Repo→Service→Runtime→UI）、自定义 Linter、CI 强制阻断。Linter 错误信息要告诉 Agent 为什么错以及正确做法。</p><p><b>③ 反馈循环（Feedback Loop）</b>——Agent 不知道自己做错了。代表实践：Agent-to-Agent Review（智能体审智能体）、自动测试套件、CI 验证、错误信号回传。</p><p><b>④ 熵管理（Entropy Management）</b>——技术债务和文档腐烂。代表实践：Doc-gardening Agent（文档园丁）、定期垃圾回收、持续小额偿还技术债。</p>","t":"<p><b>面试官想考察什么：</b>是否理解 Harness 的具体落地手段，而不仅是概念。</p><p><b>回答思路：</b>先总述「四大护栏」框架，然后逐条展开。每条都要说清「解决什么问题」+「具体怎么做」。</p><p><b>关键 insight：</b>机械化约束优于文档规范——只写在文档里的约束不够，必须通过 Linter、结构测试等方式实现，否则 Agent 迟早会偏离。</p>","s":4},{"c":"a","n":38,"q":"多智能体协作的原理是什么？和单 Agent 有什么区别？","a":"<p><b>核心思想：</b>把复杂任务拆开，多个 AI 各司其职、互相配合完成任务。就像流水线一样，每个 Agent 只负责自己擅长的一个环节。</p><p><b>典型分工：</b></p><p>Agent A（研究员）——查资料、搜数据、抓事实</p><p>Agent B（写手）——基于数据生成方案</p><p>Agent C（审稿人）——校验质量，不通过则退回 B 修改（反馈循环）</p><p><b>与单 Agent 的区别：</b></p><p>单 Agent：一个 AI 包揽所有事，不专业且容易漏</p><p>多 Agent：专业分工 + 互相校验 + 质量兜底</p><p><b>关键点：</b>用户只看到一个对话框，背后有一个「主 Agent（经理）」在后台调兵遣将。Harness 编排层负责拆解任务、分配 Agent、控制流程。</p>","t":"<p><b>面试官想考察什么：</b>对多 Agent 系统的理解，特别是分工和反馈机制。</p><p><b>回答思路：</b>用管理团队类比最通俗——你是经理，有人查数据、有人写方案、有人审质量，你只跟老板汇报最终结果。强调「一个对话框 ≠ 一个 Agent」。</p><p><b>加分项：</b>提到 Agent-to-Agent Review 模式——Codex 在本地审核自身更改，循环直到通过。这是多 Agent 中最实用的反馈机制。</p>","s":5},{"c":"a","n":39,"q":"Harness Engineering 成熟度模型有哪些等级？","a":"<p><b>Level 0：无 Harness</b>——直接给 Agent Prompt，没有结构化约束。工程师手动写代码，偶尔使用 AI。</p><p><b>Level 1：基础约束</b>——AGENTS.md、基础 Linter、手动测试。工程师主要写代码，AI 辅助。</p><p><b>Level 2：反馈回路</b>——CI/CD 集成、自动化测试、进度追踪。工程师规划和审查为主。</p><p><b>Level 3：专业化 Agent</b>——多 Agent 分工、分层上下文、持久化记忆。工程师设计和管理执行过程。</p><p><b>Level 4：自治循环</b>——无人值守并行化、自动清理、自修复。工程师架构设计和质量把关。</p><p><b>关键 insight：</b>从 Level 0 到 Level 1 的收益最明显。不要追求一步到位到高阶，先做好基础约束。</p>","t":"<p><b>面试官想考察什么：</b>是否了解 Harness Engineering 的演进路径，以及知道从哪里开始落地。</p><p><b>回答思路：</b>按等级逐级解释，强调 L0→L1 收益最大这个实践洞察。工程师的角色随等级提升从「代码编写者」转变为「环境建筑师」。</p><p><b>引用：</b>Birgitta Böckeler 的总结——「为了获得更高的 AI 自主性，运行时必须受到更严格的约束。增加信任需要的不是更多自由，而是更多限制。」</p>","s":4}];function r(){
  var ac=document.querySelector(".tb .a"),tb=document.querySelectorAll(".tb button");
  var c="all";tb.forEach(function(x){if(x.classList.contains("a"))c=x.getAttribute("data-c")||"all";});

  document.getElementById("i").textContent=s?"找到 "+items.length+" 个结果":"共 "+items.length+" 题";
  if(!items.length){document.getElementById("l").innerHTML='<div class="nr"><h3>没有匹配的题目</h3></div>';return;}

}
function om(i){
  var d=window._fi[i],lo={c:"ComfyUI",g:"Git",a:"AI Agent",q:"实战问答",p:"AIGC Python",v:"Vibe Coding"},to={c:"tgc",g:"tgg",a:"tga",q:"tgq",p:"tgp",v:"tgv"};
